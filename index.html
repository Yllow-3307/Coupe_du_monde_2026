  <style>

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--color-background-secondary);color:var(--color-text-primary);padding:20px;max-width:1200px;margin:0 auto}
   
    .mobile-title { display: none; }
    @media (max-width: 768px) {
      body:not(.forced-pc) .desktop-title { display: none; }
      body:not(.forced-pc) .mobile-title { display: block; }
      body:not(.forced-pc) { padding: 10px; }
      body:not(.forced-pc) .hdr { padding: 1rem 0; }
      body:not(.forced-pc) .hdr h1 { font-size: 18px; }
      body:not(.forced-pc) .tabs { gap: 0; margin-bottom: 1rem; }
      body:not(.forced-pc) .tab { padding: 8px 10px; font-size: 12px; }
      body:not(.forced-pc) .card { padding: 10px; }
      body:not(.forced-pc) .grp-grid { grid-template-columns: 1fr; }
      body:not(.forced-pc) .match-score { font-size: 14px; min-width: 45px; }
      body:not(.forced-pc) .team-name { font-size: 11px !important; }
      body:not(.forced-pc) .bracket-wrapper { padding: 10px; gap: 20px; }
      body:not(.forced-pc) .round { gap: 10px; }
      body:not(.forced-pc) .match { width: 150px; margin: 10px 0; }
      body:not(.forced-pc) .team { height: 32px; font-size: 11px; padding: 0 6px; }
    }

    body.forced-mobile { padding: 10px; max-width: 400px; margin: 0 auto; border: 1px solid var(--color-border-tertiary); box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    body.forced-mobile .desktop-title { display: none; }
    body.forced-mobile .mobile-title { display: block; }
    body.forced-mobile .hdr { padding: 1rem 0; }
    body.forced-mobile .hdr h1 { font-size: 18px; }
    body.forced-mobile .tabs { gap: 0; margin-bottom: 1rem; }
    body.forced-mobile .tab { padding: 8px 10px; font-size: 12px; }
    body.forced-mobile .card { padding: 10px; }
    body.forced-mobile .grp-grid { grid-template-columns: 1fr; }
    body.forced-mobile .match-score { font-size: 14px; min-width: 45px; }
    body.forced-mobile .team-name { font-size: 11px !important; }
    body.forced-mobile .bracket-wrapper { padding: 10px; gap: 20px; }
    body.forced-mobile .round { gap: 10px; }
    body.forced-mobile .match { width: 150px; margin: 10px 0; }
    body.forced-mobile .team { height: 32px; font-size: 11px; padding: 0 6px; }
    
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8f9fa;
      --color-background-info: #e8f4fd;
      --color-background-warning: #fff9db;
      --color-background-success: #ebfbee;
      --color-text-primary: #212529;
      --color-text-secondary: #495057;
      --color-text-tertiary: #adb5bd;
      --color-text-info: #1c7ed6;
      --color-text-success: #2b8a3e;
      --color-border-secondary: #dee2e6;
      --color-border-tertiary: #e9ecef;
      --border-radius-md: 6px;
      --border-radius-lg: 8px;
    }

    .hdr{padding:1.5rem 0 1rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}
    .hdr h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
    .hdr p{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
    
    .tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);overflow-x:auto}
    .tab{padding:8px 12px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
    .tab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
    .tab:hover:not(.active){color:var(--color-text-primary)}
    
    .sec{display:none}.sec.active{display:block}
    .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:10px}
    
    .btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:none;color:var(--color-text-secondary)}
    .btn:hover{background:var(--color-background-secondary)}
    .btn-primary{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
    
    .section-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px}
    .grp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    .grp-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 12px}
    .grp-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px}
    
    .team-row{display:flex;align-items:center;gap:6px;padding:4px 0 4px 5px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
    .team-row:last-child{border-bottom:none}
    .q1{border-left:3px solid #1D9E75}.q3{border-left:3px solid #EF9F27}.qn{border-left:3px solid transparent}.qelim{border-left:3px solid #E03131}
    
    .pts-cell{min-width:22px;text-align:right;color:var(--color-text-secondary);font-size:12px;cursor:pointer;padding:1px 3px;border-radius:3px}
    .pts-cell:hover{background:var(--color-background-secondary)}
    
    .score-in{width:28px;height:26px;text-align:center;font-size:13px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary)}
    .inp-sm{height:28px;font-size:13px;padding:0 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary)}
    
    .filter-container{display:flex;gap:10px;margin-bottom:15px;background:var(--color-background-primary);padding:10px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);flex-wrap:wrap}
    .select-sm{height:28px;font-size:12px;padding:0 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}

    .group-table{width:100%;border-collapse:collapse;font-size:11px}
    .group-table th{color:var(--color-text-secondary);font-weight:600;text-align:center;padding:5px 3px;border-bottom:0.5px solid var(--color-border-tertiary)}
    .group-table td{padding:6px 3px;border-bottom:0.5px solid var(--color-border-tertiary);text-align:center}
    .group-table td.team-name{text-align:left;font-size:12px;color:var(--color-text-primary)}
    .group-table tr:last-child td{border-bottom:none}
    .match-score{font-size:16px;font-weight:600;color:var(--color-text-primary);min-width:58px;text-align:center}
    .muted-empty{color:var(--color-text-tertiary);font-size:12px}
    .calendar-day{font-size:12px;font-weight:600;color:var(--color-text-secondary);margin:18px 0 8px;text-transform:uppercase;letter-spacing:0.04em}
    .subtabs{display:flex;gap:0;margin-bottom:12px;border-bottom:0.5px solid var(--color-border-tertiary)}
    .subtab{padding:7px 12px;font-size:12px;border:none;background:none;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px}
    .subtab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:600}

    .leaderboard{display:flex;flex-direction:column;gap:6px}
    .lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg)}
    .lb-winner{background:var(--color-background-warning);border-color:var(--color-border-warning)}
    
    .prog-match{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:10px}
    .prog-match-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;color:var(--color-text-secondary)}
    .prog-bet-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
    .prog-bet-row:last-child{border-bottom:none}
    
    .pts-chip{font-size:11px;padding:1px 6px;border-radius:8px;font-weight:500;margin-left:6px}
    .pts-0{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
    .pts-1{background:#FAEEDA;color:#633806}
    .pts-2{background:#EAF3DE;color:#27500A}
    .pts-3{background:#E1F5EE;color:#085041}
    
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
    .stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
    .stat-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
    .stat-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
    .stat-sub{font-size:11px;color:var(--color-text-secondary)}
    
    
    .teams-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
    .team-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
    .team-card-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer}
    .team-card-hdr:hover{background:var(--color-background-secondary)}
    .team-card-body{padding:10px 12px;display:none}
    .team-card-body.open{display:block}
    .player-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;border-bottom:0.5px solid var(--color-border-tertiary)}
    .player-row:last-child{border-bottom:none}
    .player-num{min-width:20px;color:var(--color-text-tertiary);font-size:11px}
    .player-pos{font-size:10px;padding:1px 5px;border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-secondary)}
    
    .rdv-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px}
    .rdv-date-box{background:var(--color-background-info);border-radius:var(--border-radius-md);padding:6px 10px;text-align:center;min-width:52px}
    .rdv-date-d{font-size:18px;font-weight:500;color:var(--color-text-info)}
    .rdv-date-m{font-size:10px;color:var(--color-text-info)}
    .sr-only {position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
    
    
    /* Amélioration visuelle : chemin et interactivité */
    .b-match { background: white; border: 1px solid #ddd; padding: 5px; border-radius: 4px; transition: all 0.2s; }
    .b-team { cursor: pointer; padding: 4px; border-bottom: 1px solid #eee; border-radius: 2px; }
    .b-team:hover { background: #e0f7fa; transform: scale(1.02); }
    .b-team.selected { background: #1D9E75; color: white; }
    .b-col { display: flex; flex-direction: column; justify-content: space-around; gap: 5px; }
    

    /* ===== LOGIN SCREEN ===== */
    #login-screen{position:fixed;inset:0;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;z-index:9999}
    #login-screen.hidden{display:none}
    .login-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:32px 28px;width:320px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
    .login-box h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
    .login-box p{font-size:13px;color:var(--color-text-secondary);margin-bottom:24px}
    .login-field{margin-bottom:12px}
    .login-field label{font-size:12px;font-weight:500;color:var(--color-text-secondary);display:block;margin-bottom:4px}
    .login-field input{width:100%;height:36px;padding:0 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px}
    .login-field input:focus{outline:none;border-color:var(--color-text-info)}
    .login-btn{width:100%;height:36px;background:var(--color-text-primary);color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
    .login-btn:hover{opacity:0.85}
    .login-err{font-size:12px;color:#c92a2a;margin-top:8px;text-align:center;min-height:16px}
    /* User bar */
    .user-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:12px;font-size:12px}
    .user-bar-name{flex:1;font-weight:500;color:var(--color-text-primary)}
    .user-bar-role{padding:2px 7px;border-radius:8px;font-size:11px;font-weight:500}
    .role-admin{background:#FAEEDA;color:#633806}
    .role-user{background:var(--color-background-info);color:var(--color-text-info)}
    .logout-btn{font-size:11px;padding:3px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:none;color:var(--color-text-secondary)}
    .logout-btn:hover{background:var(--color-background-secondary)}
    /* Champs désactivés pour non-admin */
    .readonly-field{pointer-events:none;opacity:0.5}

    .team-row span:first-child,
    .b-team,
    .grp-card span:first-child {
    font-size: 18px !important;
    display: inline-block;
    width: 24px;
    text-align: center;
    }

    .login-tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:20px}
    .login-tab{flex:1;padding:8px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px}
    .login-tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary)}
    .login-panel{display:none}.login-panel.active{display:block}
    .login-ok{font-size:12px;color:#2b8a3e;margin-top:8px;text-align:center;min-height:16px}

/* ===== BRACKET FIFA ===== */

.bracket-wrapper{
    display:flex;
    gap:40px;
    overflow-x:auto;
    padding:40px;
    min-width:max-content;
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-lg);
    height: 1400px;
}

.round{
    display:flex;
    flex-direction:column;
    justify-content:space-around;
    position:relative;
    height: 100%;
}

.round-title{
    text-align:center;
    font-size:11px;
    font-weight:700;
    margin-bottom:30px;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.match{
    width:190px;
    position:relative;
    margin:20px 0;
    transition: all 0.2s;
}

.team{
    height:38px;
    display:flex;
    align-items:center;
    padding:0 10px;
    background:white;
    border:1px solid var(--color-border-tertiary);
    font-size:12px;
    transition: all 0.15s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.team:first-child{
    border-radius:6px 6px 0 0;
}

.team:last-child{
    border-radius:0 0 6px 6px;
    border-top:none;
}

.team.selected {
    background: #1D9E75 !important;
    color: white !important;
    border-color: #1D9E75 !important;
}

.team:hover:not(.selected) {
    background: var(--color-background-info);
}

/* Connecteurs */
.match:not(.no-line)::after {
    content: "";
    position: absolute;
    right: -20px;
    top: 50%;
    width: 20px;
    border-top: 1.5px solid #ccc;
}
 
    
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h2>🏆 CDM 2026</h2>
    <!-- Tabs -->
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('signin')">Se connecter</button>
      <button class="login-tab" onclick="switchLoginTab('signup')">Créer un compte</button>
    </div>

    <!-- Panel : connexion -->
    <div class="login-panel active" id="panel-signin">
      <div class="login-field">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="ton@email.com" autocomplete="email">
      </div>
      <div class="login-field">
        <label>Mot de passe</label>
        <input type="password" id="signin-pwd" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" onclick="doLogin()">Se connecter</button>
      <div class="login-err" id="signin-err"></div>
    </div>

    <!-- Panel : inscription -->
    <div class="login-panel" id="panel-signup">
      <div class="login-field">
        <label>Pseudo <span style="font-size:11px;color:var(--color-text-tertiary)">(visible par tous)</span></label>
        <input type="text" id="signup-pseudo" placeholder="Ex: Louis, Alban..." maxlength="20" autocomplete="off">
      </div>
      <div class="login-field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="ton@email.com" autocomplete="email">
      </div>
      <div class="login-field">
        <label>Mot de passe <span style="font-size:11px;color:var(--color-text-tertiary)">(6 caractères min.)</span></label>
        <input type="password" id="signup-pwd" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="login-btn" onclick="doSignup()">Créer mon compte</button>
      <div class="login-err" id="signup-err"></div>
      <div class="login-ok" id="signup-ok"></div>
    </div>
  </div>
</div>

<!-- USER BAR (shown when logged in) -->
<div class="user-bar" id="user-bar" style="display:none">
  <span style="font-size:16px" id="user-avatar">👤</span>
  <span class="user-bar-name" id="user-name">—</span>
  <span class="user-bar-role" id="user-role-badge">—</span>
  <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout" aria-hidden="true"></i> Déconnexion</button>
</div>

<h2 class="sr-only">Tracker Coupe du Monde 2026 — groupes, bracket, pronos, stats équipes, fiches joueurs et RDV soirées</h2>

<div class="hdr">
  <span style="font-size:28px">🏆</span>
  <div style="flex:1">
    <h1 class="desktop-title">Coupe du Monde FIFA 2026</h1>
    <h1 class="mobile-title">CDM 2026</h1>
  </div>
  <button class="btn" onclick="toggleView()" id="view-toggle" title="Alterner entre vue PC et Mobile">
    <i class="ti ti-device-mobile"></i> Mobile / PC
  </button>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('groupes')"><i class="ti ti-table" aria-hidden="true"></i> Groupes</button>
  <button class="tab" onclick="showTab('matchs')"><i class="ti ti-calendar" aria-hidden="true"></i> Matchs</button>
  <button class="tab" onclick="showTab('bracket')"><i class="ti ti-tournament" aria-hidden="true"></i> Bracket</button>
  <button class="tab" onclick="showTab('pronos')"><i class="ti ti-podium" aria-hidden="true"></i> Pronos</button>
  <button class="tab" onclick="showTab('stats')"><i class="ti ti-chart-bar" aria-hidden="true"></i> Stats</button>
  <button class="tab" onclick="showTab('equipes')"><i class="ti ti-shirt" aria-hidden="true"></i> Équipes</button>
  <button class="tab" onclick="showTab('rdv')"><i class="ti ti-map-pin" aria-hidden="true"></i> RDV</button>
  <button class="tab" onclick="showTab('admin')"><i class="ti ti-users" aria-hidden="true"></i> Admin</button>
</div>

<div id="groupes" class="sec active"></div>

// ===== FIREBASE AUTH & FIRESTORE =====
const ADMIN_EMAIL = "louis.ragot.33@gmail.com"; // ← ton email admin

let currentPote = null;
let isAdmin = false;
let unsubscribers = {};
let PLAYERS_MAP = {}; // uid -> pseudo

// ===== LOGIN / SIGNUP TABS =====
function switchLoginTab(tab) {
  document.querySelectorAll('.login-tab').forEach((t,i) =>
    t.classList.toggle('active', ['signin','signup'][i] === tab));
  document.getElementById('panel-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
}

// ===== SIGN IN =====
async function doLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await firebase.auth().signInWithPopup(provider); // Ouvre une petite fenêtre propre
  } catch (error) {
    console.error("Erreur login:", error);
    alert("Erreur de connexion : " + error.message);
  }
}

// ===== SIGN UP =====
async function doSignup() {
  const pseudo = document.getElementById('signup-pseudo').value.trim();
  const email  = document.getElementById('signup-email').value.trim();
  const pwd    = document.getElementById('signup-pwd').value;
  const errEl  = document.getElementById('signup-err');
  const okEl   = document.getElementById('signup-ok');

  if (!pseudo || pseudo.length > 20) { errEl.textContent = 'Pseudo invalide'; return; }
  if (!email) { errEl.textContent = 'Email requis'; return; }
  if (pwd.length < 6) { errEl.textContent = 'Mot de passe trop court'; return; }

  errEl.textContent = 'Création en cours...';

  try {
    const cred = await window._auth.createUserWithEmailAndPassword(email, pwd);
    
    // On attend un peu que l'utilisateur soit bien créé
    await new Promise(r => setTimeout(r, 800));

    const db = window._db;

    // Création du profil utilisateur
    await db.collection('users').doc(cred.user.uid).set({
      pseudo: pseudo,
      email: email,
      createdAt: Date.now()
    });

    // Ajout dans la liste des joueurs
    await db.collection('shared').doc('players').set({
      [cred.user.uid]: pseudo
    }, { merge: true });

    okEl.textContent = '✓ Compte créé avec succès !';
    errEl.textContent = '';

  } catch(e) {
    console.error(e);
    errEl.textContent = e.message || "Erreur lors de la création";
  }
}

// ===== LOGOUT =====
function doLogout() { window._auth.signOut(); }

function toggleView() {
  const isMobile = document.body.classList.contains('forced-mobile');
  if (isMobile) {
    document.body.classList.remove('forced-mobile');
    document.body.classList.add('forced-pc');
    localStorage.setItem('view-mode', 'pc');
  } else {
    document.body.classList.remove('forced-pc');
    document.body.classList.add('forced-mobile');
    localStorage.setItem('view-mode', 'mobile');
  }
  // Rafraîchir l'onglet actif pour recalculer les dimensions si besoin
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) activeTab.click();
}

// ===== AUTH STATE =====
window.addEventListener('load', () => {
  const savedMode = localStorage.getItem('view-mode');
  if (savedMode === 'mobile') document.body.classList.add('forced-mobile');
  else if (savedMode === 'pc') document.body.classList.add('forced-pc');
  // Keydown shortcuts
  document.getElementById('signin-pwd').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('signup-pwd').addEventListener('keydown', e => { if(e.key==='Enter') doSignup(); });

  window._auth.onAuthStateChanged(async user => {
    if (user) {
      currentUser = user;
      // Load pseudo from Firestore
      const userDoc = await window._db.collection('users').doc(user.uid).get();
      if (userDoc.exists && userDoc.data().pseudo) {
        currentPote = userDoc.data().pseudo;
      } else {
        currentPote = user.email.split('@')[0];
      }
      isAdmin = user.email === ADMIN_EMAIL;
      // Load players list then boot
      await loadPlayers();
      bootApp();
    } else {
      currentUser = null; currentPote = null; isAdmin = false;
      Object.values(unsubscribers).forEach(u => typeof u === 'function' && u());
      unsubscribers = {};
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('user-bar').style.display = 'none';
    }
  });
});

// ===== HELPERS =====
const palette_bg = ["#CECBF6","#9FE1CB","#F5C4B3","#FAC775","#B5D4F4","#F4C0D1","#C0DD97","#D3D1C7","#FFD6A5","#CAFFBF"];
const palette_tx = ["#3C3489","#085041","#712B13","#633806","#0C447C","#72243E","#27500A","#2C2C2A","#7C4D00","#1A6300"];

async function loadPlayers() {
  try {
    const snap = await window._db.collection('shared').doc('players').get();
    if (snap.exists) {
      PLAYERS_MAP = snap.data();
      const pseudos = Object.values(PLAYERS_MAP).sort();
      POTES.length = 0; AV_BG.length = 0; AV_TX.length = 0;
      pseudos.forEach((p, i) => {
        POTES.push(p);
        AV_BG.push(palette_bg[i % palette_bg.length]);
        AV_TX.push(palette_tx[i % palette_tx.length]);
      });
    }
  } catch(e) {
    console.error("ERREUR COMPLETE :", e);
  }
}

function bootApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('user-bar').style.display = 'flex';
  document.getElementById('user-name').textContent = currentPote;
  document.getElementById('user-role-badge').textContent = isAdmin ? 'Admin' : 'Joueur';
  document.getElementById('user-role-badge').className = 'user-bar-role ' + (isAdmin ? 'role-admin' : 'role-user');
  subscribeFirestore();
  renderGroups();
}

function subscribeFirestore() {
  const db = window._db;

  // Players list
  unsubscribers['players'] = db.collection('shared').doc('players').onSnapshot(snap => {
    if (snap.exists) {
      PLAYERS_MAP = snap.data();
      const pseudos = Object.values(PLAYERS_MAP).sort();
      POTES.length = 0; AV_BG.length = 0; AV_TX.length = 0;
      pseudos.forEach((p, i) => {
        POTES.push(p);
        AV_BG.push(palette_bg[i % palette_bg.length]);
        AV_TX.push(palette_tx[i % palette_tx.length]);
      });
    }
  });

  // Pronos Real-time — un listener par utilisateur connu dans PLAYERS_MAP
  // (évite collectionGroup qui nécessite un index Firestore spécial)
  function subscribeAllPronos() {
  // Désabonner les anciens
  Object.keys(unsubscribers).filter(k => k.startsWith('pronos_user_')).forEach(k => {
    if (typeof unsubscribers[k] === 'function') unsubscribers[k]();
    delete unsubscribers[k];
  });

  const userId = currentUser.uid;            // ← seulement l'user courant
  const pseudo = currentPote;

  // Un listener par match pour l'utilisateur connecté
  PRONO_MATCHES.forEach(m => {
    const key = 'pronos_match_' + m.id;
    if (unsubscribers[key]) return;

    unsubscribers[key] = db.collection('pronos').doc(m.id)
      .collection('users').doc(userId)
      .onSnapshot(snap => {
        const k2 = m.id + pseudo;
        if (snap.exists) {
          const data = snap.data();
          D.pronos[k2] = {
            s1: data.scoreHome ?? '',
            s2: data.scoreAway ?? '',
            buteursHome: data.buteursHome || [],
            buteursAway: data.buteursAway || [],
            validatedAt: data.validatedAt || null
          };
        } else {
          delete D.pronos[k2];
        }
        if (document.getElementById('pronos').classList.contains('active')) renderPronos();
      }, err => console.error('Erreur listener prono', m.id, err));
  });

  // Pour les autres potes (lecture seule, sans listener temps réel) :
  Object.entries(PLAYERS_MAP).forEach(([uid, pseudo2]) => {
    if (uid === userId) return; // déjà géré au-dessus
    loadPronosForUser(uid, pseudo2);
  });
}

  async function loadPronosForUser(userId, pseudo) {
    // Fallback : lit directement pronos/{matchId}/users/{userId} pour chaque match
    try {
      const matchIds = PRONO_MATCHES.map(m => m.id);
      for (const matchId of matchIds) {
        const ref = db.collection('pronos').doc(matchId).collection('users').doc(userId);
        const snap = await ref.get();
        if (snap.exists) {
          const data = snap.data();
          D.pronos[matchId + pseudo] = {
            s1: data.scoreHome ?? data.s1 ?? '',
            s2: data.scoreAway ?? data.s2 ?? '',
            buteursHome: data.buteursHome || [],
            buteursAway: data.buteursAway || [],
            validatedAt: data.validatedAt || null
          };
        }
      }
      if (document.getElementById('pronos').classList.contains('active')) renderPronos();
    } catch(e) {
      console.error('Erreur loadPronosForUser', userId, e);
    }
  }

  subscribeAllPronos();

  // Shared data
  unsubscribers['shared'] = db.collection('shared').doc('data').onSnapshot(snap => {
    if (snap.exists) {
      const data = snap.data();
      D.scores    = data.scores    || {};
      D.bracket   = data.bracket   || {};
      D.teamStats = data.teamStats || TEAMS_DATA.map(t=>({flag:t.flag,name:t.name,mvp:'',goals:0,played:0,cs:0,against:0}));
      D.playerRatings = data.playerRatings || {};
      D.pts       = data.pts       || {};

      syncScoresFromActuals();
      const activeTab = document.querySelector('.tab.active');
      if (activeTab && activeTab.textContent.trim() !== 'RDV') activeTab.click();
    }
  });

  // RDVs Real-time
  if (!unsubscribers['rdvs']) {
    unsubscribers['rdvs'] = db.collection('rdv').onSnapshot(snap => {
      const activeEl = document.activeElement;
      const focusedId = activeEl ? activeEl.id : null;

      const newRdvList = snap.docs.map(doc => {
          const data = doc.data();
          const rdvId = doc.id;
          // Si on est en train d'éditer un champ de ce RDV, on garde la valeur locale
          if (focusedId === `rdv_match_${rdvId}`) data.match = activeEl.value;
          if (focusedId === `rdv_heure_${rdvId}`) data.heure = activeEl.value;
          if (focusedId === `rdv_lieu_${rdvId}`) data.lieu = activeEl.value;
          return { id: rdvId, ...data };
      });

      D.rdvList = newRdvList;
      
      const activeTab = document.querySelector('.tab.active');
      if (activeTab && activeTab.textContent.trim() === 'RDV') {
         const selectionStart = (activeEl && activeEl.selectionStart !== undefined) ? activeEl.selectionStart : null;
         const selectionEnd = (activeEl && activeEl.selectionEnd !== undefined) ? activeEl.selectionEnd : null;
         
         renderRdv();
         
         if (focusedId) {
           const el = document.getElementById(focusedId);
           if (el) {
             el.focus();
             if (selectionStart !== null && el.setSelectionRange) {
                 try { el.setSelectionRange(selectionStart, selectionEnd); } catch(e) {}
             }
           }
         }
      }
    });
  }

  // Actual scores (backup)
  unsubscribers['actuals'] = db.collection('shared').doc('actuals').onSnapshot(snap => {
    if (snap.exists) { D.actual = snap.data().actuals || {}; syncScoresFromActuals(); const activeTab = document.querySelector('.tab.active'); if (activeTab) activeTab.click(); }
  });


  // Synchronisation initiale
  syncScoresFromActuals();
}

async function save() {
  if (!currentUser) { localStorage.setItem('wc26v3', JSON.stringify(D)); return; }
  if (!isAdmin) return;
  try {
    await window._db.collection('shared').doc('data').set({
      scores: D.scores || {},
      bracket: D.bracket || {},
      teamStats: D.teamStats || [],
      playerRatings: D.playerRatings || {},
      pts: D.pts || {}
    });
  } catch(e) {
  console.error("ERREUR COMPLETE :", e);
}
}

async function saveActuals() {
  if (!isAdmin) return;
  try {
    await window._db.collection('shared').doc('actuals').set({ actuals: D.actual || {} });
  } catch(e) {
  console.error("ERREUR COMPLETE :", e);
}
}

async function saveBet(matchId, field, value) {
  if (!currentUser) return;
  const userId = currentUser.uid;
  const key = matchId + currentPote;
  
  if (!D.pronos[key]) D.pronos[key] = { s1: '', s2: '', buteursHome: [], buteursAway: [] };
  
  if (field === 's1' || field === 's2') {
    D.pronos[key][field] = value;
  } else if (field.startsWith('buteursHome')) {
    const idx = parseInt(field.split('_')[1]);
    D.pronos[key].buteursHome[idx] = value;
  } else if (field.startsWith('buteursAway')) {
    const idx = parseInt(field.split('_')[1]);
    D.pronos[key].buteursAway[idx] = value;
  }

  try {
    const ref = window._db.collection('pronos').doc(matchId).collection('users').doc(userId);
    const dataToSave = {
      scoreHome: D.pronos[key].s1,
      scoreAway: D.pronos[key].s2,
      buteursHome: D.pronos[key].buteursHome,
      buteursAway: D.pronos[key].buteursAway,
      updatedAt: Date.now()
    };
    if (field === 'validate') {
        dataToSave.validatedAt = Date.now();
        D.pronos[key].validatedAt = dataToSave.validatedAt;
    }
    await ref.set(dataToSave, { merge: true });
  } catch(e) {
    console.error("Erreur lors de la sauvegarde du prono :", e);
  }
}

function isLocked(matchId) {
  const m = PRONO_MATCHES.find(m => m.id === matchId);
  if (!m || !m.kickoff) return false;
  return new Date() >= new Date(m.kickoff);
}

 function syncActualsFromScores() {
  PRONO_MATCHES.forEach(m => {
    if (m.matchIdx === undefined || m.matchIdx === null) return;

    const idx = m.matchIdx;
    const s1 = D.scores[idx + 'a'];
    const s2 = D.scores[idx + 'b'];
    const buteur1 = D.scores[idx + 'buteur1'] || '';
    const buteur2 = D.scores[idx + 'buteur2'] || '';

    if (!D.actual[m.id]) D.actual[m.id] = {};

    if (s1 !== undefined && s1 !== '') D.actual[m.id].s1 = s1;
    if (s2 !== undefined && s2 !== '') D.actual[m.id].s2 = s2;

  });

  // Sauvegarde dans Firestore si admin
  if (isAdmin) saveActuals();
}

async function saveMatchActual(matchId, field, value) {
  if (!isAdmin) return;
  try {
    const ref = window._db.collection('matches').doc(matchId);
    await ref.set({ [field]: value }, { merge: true });
  } catch(e) {
    console.error("Erreur saveMatchActual:", e);
  }
}

// Variables globales de filtres pour les matchs
let currentFilterPhase = "all";
let currentFilterGroup = "all";
let currentStatsSection = "equipes";

// Source JSON optionnelle pour les resultats automatiques.
// Format accepte par match : { id:"p1", homeScore:1, awayScore:0, scorers:[{name:"Mbappe", goals:2}] }
const RESULTS_FEED_URL = "https://worldcup26.ir/get/games";

// D is now synced from Firestore. Initialize empty.
let D = {
  pts: {}, scores: {}, bracket: {},
  pronos: {}, actual: {},
  teamStats: TEAMS_DATA.map(t=>({flag:t.flag,name:t.name,mvp:'',goals:0,played:0,cs:0,against:0})),
  playerRatings: {},
  rdvList: [{id:'rdv_0',match:'',heure:'',where:'',owner:'',presents:{}}]
};
// save() is now async and writes to Firestore (defined above)


function matchActualByIndex(idx) {
  const prono = PRONO_MATCHES.find(m => m.matchIdx === idx);
  return prono ? (D.actual[prono.id] || {}) : {};
}

function getScoreValue(matchId, side) {
  const actual = D.actual[matchId] || {};
  const v = side === 1 ? actual.s1 : actual.s2;
  return v === undefined || v === null ? '' : v;
}

function parseScorers(value) {
  if (Array.isArray(value)) {
    return value.map(s => ({
      name: (s.name || s.player || '').trim(),
      goals: parseInt(s.goals || s.buts || 1) || 1
    })).filter(s => s.name);
  }
  return String(value || '').split(/[,;\n]+/).map(raw => {
    const txt = raw.trim();
    if (!txt) return null;
    const m = txt.match(/^(.*?)(?:\s*[xX]\s*(\d+)|\s*\((\d+)\))?$/);
    return {name:(m && m[1] ? m[1] : txt).trim(), goals:parseInt((m && (m[2] || m[3])) || 1) || 1};
  }).filter(Boolean);
}

function formatScorers(value) {
  const scorers = parseScorers(value);
  if (!scorers.length) return '';
  return scorers.map(s => s.goals > 1 ? s.name + ' x' + s.goals : s.name).join(', ');
}

function normalizeName(value) {
  return String(value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function scorerMatches(actualValue, betValue) {
  const actual = parseScorers(actualValue).map(s => normalizeName(s.name)).filter(Boolean);
  let bet = [];
  if (Array.isArray(betValue)) {
    bet = betValue.filter(Boolean).map(s => normalizeName(s));
  } else {
    bet = parseScorers(betValue).map(s => normalizeName(s.name)).filter(Boolean);
  }
  return bet.some(b => actual.some(a => a.includes(b) || b.includes(a)));
}

function goalCount(value) {
  if (Array.isArray(value)) return value.filter(Boolean).length;
  return parseScorers(value).reduce((sum, s) => sum + (parseInt(s.goals) || 1), 0);
}

function renderReadonlyScore(actual) {
  const s1 = actual ? actual.s1 : undefined;
  const s2 = actual ? actual.s2 : undefined;
  const hasScore = s1 !== undefined && s1 !== null && s1 !== '' && s2 !== undefined && s2 !== null && s2 !== '';
  return hasScore ? s1 + ' - ' + s2 : '<span class="muted-empty">En attente</span>';
}

function applyAutomaticMatchResult(matchId, payload) {
  if (!D.actual[matchId]) D.actual[matchId] = {};
  const s1 = payload.s1 ?? payload.homeScore ?? payload.score1 ?? payload.home_goals ?? payload.home_score;
  const s2 = payload.s2 ?? payload.awayScore ?? payload.score2 ?? payload.away_goals ?? payload.away_score;
  if (s1 !== undefined && s1 !== null && s1 !== '') D.actual[matchId].s1 = String(s1);
  if (s2 !== undefined && s2 !== null && s2 !== '') D.actual[matchId].s2 = String(s2);
  const scorers = payload.scorers ?? payload.buteurs ?? payload.goalscorers ?? payload.top ?? [payload.home_scorers, payload.away_scorers].filter(v => v && v !== 'null').join(', ');
  if (scorers !== undefined) D.actual[matchId].top = formatScorers(scorers);
}

async function refreshAutomaticResults(showMessage = true) {
  if (!RESULTS_FEED_URL) {
    if (showMessage) alert("Aucune source automatique n'est encore configurée.");
    return;
  }
  try {
    const res = await fetch(RESULTS_FEED_URL, {cache:'no-store'});
    const data = await res.json();
    const matches = Array.isArray(data) ? data : (data.games || data.matches || data.results || []);
    matches.forEach(item => {
      const status = String(item.finished ?? item.status ?? item.time_elapsed ?? '').toLowerCase();
      if (status === 'false' || status === 'notstarted' || status === 'scheduled') return;
      const rawId = item.pronoId || item.matchId || item.id;
      const id = String(rawId || '').startsWith('p') ? String(rawId) : 'p' + rawId;
      if (rawId) applyAutomaticMatchResult(id, item);
    });
    if (isAdmin) await saveActuals();
    syncScoresFromActuals();
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) activeTab.click();
  } catch(e) {
    console.error(e);
    if (showMessage) alert("Impossible d'actualiser les résultats automatiquement.");
  }
}

function syncScoresFromActuals() {
  PRONO_MATCHES.forEach(m => {
    if (m.matchIdx === undefined || m.matchIdx === null) return;
    const actual = D.actual[m.id] || {};
    if (actual.s1 !== undefined) D.scores[m.matchIdx + 'a'] = actual.s1;
    if (actual.s2 !== undefined) D.scores[m.matchIdx + 'b'] = actual.s2;
    if (actual.top) D.scores[m.matchIdx + 'buteur1'] = actual.top;
    if (actual.scorers1) D.scores[m.matchIdx + 'scorers1'] = actual.scorers1;
    if (actual.scorers2) D.scores[m.matchIdx + 'scorers2'] = actual.scorers2;
  });
  autoComputeTeamStats();
}

function autoComputeTeamStats() {
  const statsMap = {};
  TEAMS_DATA.forEach(t => {
    statsMap[t.name] = { flag: t.flag, name: t.name, mvp: '', goals: 0, played: 0, against: 0, wins: 0 };
  });

  PRONO_MATCHES.forEach(m => {
    const actual = D.actual[m.id] || {};
    const s1 = parseInt(actual.s1);
    const s2 = parseInt(actual.s2);
    if (isNaN(s1) || isNaN(s2)) return;

    const parts = m.label.split(' vs ');
    const team1 = Object.values(statsMap).find(t => parts[0] && parts[0].includes(t.name));
    const team2 = Object.values(statsMap).find(t => parts[1] && parts[1].includes(t.name));

    if (team1) { 
      team1.played++; team1.goals += s1; team1.against += s2; 
      if (s1 > s2) team1.wins++;
    }
    if (team2) { 
      team2.played++; team2.goals += s2; team2.against += s1; 
      if (s2 > s1) team2.wins++;
    }
  });

  if (D.teamStats) {
    D.teamStats.forEach(t => {
      if (t.mvp && statsMap[t.name]) statsMap[t.name].mvp = t.mvp;
    });
  }

  D.teamStats = Object.values(statsMap).sort((a,b) => (b.goals - b.against) - (a.goals - a.against));
}

let bracketZoom = 1.0;

function renderBracket() {
  const el = document.getElementById('bracket');
  if (!el) return;

  el.innerHTML = `

          <button class="btn" onclick="bracketZoomChange(0.15)" style="font-size:16px;padding:2px 8px">+</button>
          <button class="btn" onclick="bracketZoomChange(0, true)" style="font-size:11px;padding:3px 8px">Reset</button>
        </div>
      </div>
      <div id="bracket-scroll" style="overflow:auto;cursor:grab;user-select:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:16px 10px">

          ${createFullBracket()}
        </div>
      </div>
    </div>
  `;
  applyBracketZoom();
  initBracketPanZoom();
}

function bracketZoomChange(delta, reset) {
  if (reset) { bracketZoom = 1.0; }
  else { bracketZoom = Math.max(0.3, Math.min(2.0, bracketZoom + delta)); }
  applyBracketZoom();
}

function applyBracketZoom() {
  const inner = document.getElementById('bracket-inner');
  const lbl = document.getElementById('bracket-zoom-label');
  if (inner) {
    inner.style.transformOrigin = 'left center';
    inner.style.transform = 'scaleX(' + bracketZoom + ')';
  }
  if (lbl) lbl.textContent = Math.round(bracketZoom * 100) + '%';
  // Update scroll container height to fit zoomed content (height is fixed now)
  const scroll = document.getElementById('bracket-scroll');
  if (inner && scroll) {
    scroll.style.height = '1450px';
  }
}

function initBracketPanZoom() {
  const scroll = document.getElementById('bracket-scroll');
  if (!scroll) return;
  // Pinch-to-zoom support
  let lastDist = null;
  scroll.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
  }, {passive: true});
  scroll.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && lastDist) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const scale = dist / lastDist;
      bracketZoom = Math.max(0.3, Math.min(2.0, bracketZoom * scale));
      lastDist = dist;
      applyBracketZoom();
    }
  }, {passive: true});
  scroll.addEventListener('touchend', () => { lastDist = null; });
}

function pickWinner(key, teamNum) {
  const t1 = D.bracket[key + '_t1'] || 'À déterminer';
  const t2 = D.bracket[key + '_t2'] || 'À déterminer';
  
  const winner = teamNum === 1 ? t1 : t2;
  
  if (winner === 'À déterminer') return;

  D.bracket[key + '_w'] = winner;
  
  propagateWinner(key, winner); // propagation automatique
  
  save();
  renderBracket();
}

function propagateWinner(key, winner) {
  const parts = key.split('_');
  const phase = parts[0];
  const index = parseInt(parts[1]);

  let nextKey = null;

  if (phase === 'r32') {
    nextKey = `16_${Math.floor(index / 2)}`;
  } else if (phase === '16') {
    nextKey = `qf_${Math.floor(index / 2)}`;
  } else if (phase === 'qf') {
    nextKey = `sf_${Math.floor(index / 2)}`;
  } else if (phase === 'sf') {
    nextKey = 'final';
  }

  if (nextKey) {
    const slot = (index % 2 === 0) ? '_t1' : '_t2';
    D.bracket[nextKey + slot] = winner;
  }
}

function setActual(mid,f,v){
  if(!isAdmin) return;
  if(!D.actual[mid]) D.actual[mid]={};
  // Empêcher les scores négatifs
  if((f==='s1' || f==='s2') && v !== '') v = String(Math.max(0, parseInt(v)||0));
  
  if (f.startsWith('buteursReelsHome_')) {
    const idx = parseInt(f.split('_')[1]);
    if (!D.actual[mid].buteursReelsHome) D.actual[mid].buteursReelsHome = [];
    D.actual[mid].buteursReelsHome[idx] = v;
    saveMatchActual(mid, 'buteursReelsHome', D.actual[mid].buteursReelsHome);
  } else if (f.startsWith('buteursReelsAway_')) {
    const idx = parseInt(f.split('_')[1]);
    if (!D.actual[mid].buteursReelsAway) D.actual[mid].buteursReelsAway = [];
    D.actual[mid].buteursReelsAway[idx] = v;
    saveMatchActual(mid, 'buteursReelsAway', D.actual[mid].buteursReelsAway);
  } else {
    D.actual[mid][f]=v;
    saveMatchActual(mid, f, v);
  }

  // Update legacy top field for compatibility
  const bh = D.actual[mid].buteursReelsHome || [];
  const ba = D.actual[mid].buteursReelsAway || [];
  D.actual[mid].top = [...bh, ...ba].filter(Boolean).join(', ');

  saveActuals();
  syncScoresFromActuals();
  const el = document.getElementById('pronos');
  if(el && el.classList.contains('active')) renderPronos();
  if(document.getElementById('matchs').classList.contains('active')) renderMatchs();
}
  

function setBet(mid, f, v) {
  if (isLocked(mid)) return;
  // Empêcher les scores négatifs
  if((f==='s1' || f==='s2') && v !== '') v = String(Math.max(0, parseInt(v)||0));
  saveBet(mid, f, v);
  
  // Re-render immediately for responsiveness
  if (f === 's1' || f === 's2') {
    renderPronos();

}
  
function calcPts(matchId, pote){
  const actual = D.actual[matchId] || {s1:'', s2:'', top:''};
  const bet = D.pronos[matchId+pote] || {s1:'', s2:'', buteursHome:[], buteursAway:[]};
  if(bet.s1 === '' && bet.s2 === '' && (!bet.buteursHome || bet.buteursHome.length === 0) && (!bet.buteursAway || bet.buteursAway.length === 0)) return 0;
  if(actual.s1 === '' || actual.s2 === '' || actual.s1 === undefined || actual.s2 === undefined) return 0;
  let pts = 0;
  const bs1 = parseInt(bet.s1), bs2 = parseInt(bet.s2), as1 = parseInt(actual.s1), as2 = parseInt(actual.s2);
  if((bs1 > bs2 && as1 > as2) || (bs1 < bs2 && as1 < as2) || (bs1 === bs2 && as1 === as2)) pts += 1;
  if(String(bet.s1) === String(actual.s1) && String(bet.s2) === String(actual.s2)) pts += 2;
  
  const allBetScorers = [...(bet.buteursHome || []), ...(bet.buteursAway || [])];
  if(actual.top && allBetScorers.length > 0 && scorerMatches(actual.top, allBetScorers)) pts += 3;
  return pts;
}

function calcLB(){
  return POTES.map(p=>({name:p,pts:PRONO_MATCHES.reduce((s,m)=>s+calcPts(m.id,p),0)})).sort((a,b)=>b.pts-a.pts);
}

function getGroupeClassement(groupe) {
  const equipes = GROUPS[groupe].teams.map(t => ({
    flag: t[0], nom: t[1], mj: 0, g: 0, n: 0, p: 0, bp: 0, bc: 0, db: 0, pt: 0
  }));
  MATCHS_DATA.forEach((m, idx) => {
    if (m.g !== groupe) return;
    const actual = matchActualByIndex(idx);
    if (actual.s1 === undefined || actual.s2 === undefined || actual.s1 === '' || actual.s2 === '') return;
    const score1 = parseInt(actual.s1);
    const score2 = parseInt(actual.s2);
    const team1 = equipes.find(t => m.t1.includes(t.nom));
    const team2 = equipes.find(t => m.t2.includes(t.nom));
    if (!team1 || !team2 || Number.isNaN(score1) || Number.isNaN(score2)) return;
    team1.mj++; team2.mj++;
    team1.bp += score1; team1.bc += score2;
    team2.bp += score2; team2.bc += score1;
    if (score1 > score2) { team1.g++; team2.p++; team1.pt += 3; }
    else if (score1 < score2) { team2.g++; team1.p++; team2.pt += 3; }
    else { team1.n++; team2.n++; team1.pt++; team2.pt++; }
  });
  equipes.forEach(t => { t.db = t.bp - t.bc; });
  return equipes.sort((a, b) => {
    if (b.pt !== a.pt) return b.pt - a.pt;
    if (b.db !== a.db) return b.db - a.db;
    return b.bp - a.bp;
  });
}

async function togglePresence(rdvId, isCurrentlyPresent) {
  const db = window._db;
  const ref = db.collection('rdv').doc(rdvId);
  const uid = currentUser.uid;
  try {
    if (isCurrentlyPresent) {
      await ref.update({ participants: firebase.firestore.FieldValue.arrayRemove(uid) });
    } else {
      await ref.update({ participants: firebase.firestore.FieldValue.arrayUnion(uid) });
    }
  } catch(e) {
    console.error("Erreur togglePresence:", e);
  }
}

async function resetAllMatchStatus() {
  if (!isAdmin) return;
  if (!confirm("⚠️ Es-tu sûr de vouloir remettre tous les matchs en statut 'En attente' ? Cela effacera tous les scores réels.")) return;
  
  D.scores = {};
  D.actual = {};
  
  // Clear team stats too as they depend on scores
  D.teamStats = TEAMS_DATA.map(t=>({flag:t.flag, name:t.name, mvp:'', goals:0, played:0, cs:0, against:0}));
  
  await save();
  await saveActuals();

  showTab('admin');
}

// Fonction de suppression
async function deleteUser(pote) {
  if (!isAdmin) return;
  if (!confirm(`⚠️ Supprimer le joueur "${pote}" ?\n\nSes pronos et son profil seront définitivement effacés.`)) {
    return;
  }

  try {
    const db = window._db;

    // 1. Supprimer ses pronos
    await db.collection('pronos').doc(pote).delete();

    // 2. Supprimer son profil user
    const userSnap = await db.collection('shared').doc('players').get();
    if (userSnap.exists) {
      const data = userSnap.data();
      // Trouver l'UID correspondant au pseudo
      let uidToRemove = null;
      for (let [uid, pseudo] of Object.entries(data)) {
        if (pseudo === pote) {
          uidToRemove = uid;
          break;
        }
      }
      if (uidToRemove) {
        await db.collection('users').doc(uidToRemove).delete();
        
        // 3. Retirer de la liste des players
        delete data[uidToRemove];
        await db.collection('shared').doc('players').set(data);
      }
    }

    alert(`✅ ${pote} a été supprimé.`);
    
    // Rafraîchir
    await loadPlayers();
    renderAdmin();
    // Rafraîchir aussi les autres onglets si besoin
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) activeTab.click();

  } catch (e) {
    console.error(e);
    alert("Erreur lors de la suppression : " + e.message);
  }
}
