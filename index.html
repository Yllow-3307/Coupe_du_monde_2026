// --- SYNCHRO SANS FIL FIREBASE ---
onSnapshot(docRef, (docSnap) => {
  if (docSnap.exists()) {
    window.D = docSnap.data();
    if(!window.D.pts) window.D.pts = {};
    if(!window.D.scores) window.D.scores = {};
    if(!window.D.bracket) window.D.bracket = {};
    if(!window.D.pronos) window.D.pronos = {};
    if(!window.D.actual) window.D.actual = {};
    if(!window.D.teamStats) window.D.teamStats = [];
    if(!window.D.rdvList) window.D.rdvList = [];
    refreshCurrentView();
  } else {
    window.save();
  }
});

window.save = function() {
  setDoc(docRef, window.D)
    .then(() => console.log("Sauvegarde Firebase OK"))
    .catch((e) => console.error("Erreur Firebase:", e));
}

function refreshCurrentView() {
  const renders = {
    groupes: window.renderGroups,
    matchs: window.renderMatchs,
    bracket: window.renderBracket,
    pronos: window.renderPronos,
    stats: window.renderStats,
    equipes: window.renderEquipes,
    rdv: window.renderRdv
  };
  if(renders[currentTabId]) renders[currentTabId]();
}

window.showTab = function(id) {
  currentTabId = id;
  const tabs = ['groupes','matchs','bracket','pronos','stats','equipes','rdv'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', tabs[i]===id));
  document.querySelectorAll('.sec').forEach(s => s.classList.toggle('active', s.id===id));
  refreshCurrentView();
}

// --- BRACKET CORRECTEMENT ÉQUILIBRÉ (8 matchs de chaque côté) ---
window.renderBracket = function(){
  const el=document.getElementById('bracket');
  if(!el) return;

  function bCol(slots, ri, offset){
    const spacer = Math.pow(2, ri) * 12;
    let html = '';
    for(let i = 0; i < slots; i++){
      const mi = offset + i;
      const k1 = `r${ri}m${mi}t1`, k2 = `r${ri}m${mi}t2`;
      const t1 = window.D.bracket[k1] || (ri === 0 ? `Éq.${mi*2+1}` : '?');
      const t2 = window.D.bracket[k2] || (ri === 0 ? `Éq.${mi*2+2}` : '?');
      const nk = `r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
      const w = window.D.bracket[nk];
      
      html += `<div class="b-match">
        <div class="b-team${w===t1?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',1)">${t1}</div>
        <div class="b-team${w===t2?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',2)">${t2}</div>
      </div>`;
      if(i < slots - 1) html += `<div style="height:${spacer}px"></div>`;
    }
    return html;
  }

  const colLabels = ["32es", "16es", "Huitièmes", "Quarts", "Demies"];
  
  let leftCols = '';
  for(let r = 0; r < 5; r++){
    const slots = 8 / Math.pow(2, r);
    if (slots < 1) break;
    leftCols += `<div class="b-col">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column;justify-content:center;height:100%">${bCol(slots, r, 0)}</div>
    </div>`;
  }

  let rightCols = '';
  for(let r = 4; r >= 0; r--){
    const slots = 8 / Math.pow(2, r);
    if (slots < 1) continue;
    const offset = 8 / Math.pow(2, r); 
    rightCols += `<div class="b-col">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column;justify-content:center;height:100%">${bCol(slots, r, offset)}</div>
    </div>`;
  }

  const ft1 = window.D.bracket['r4m0t1'] || '?'; 
  const ft2 = window.D.bracket['r4m0t2'] || '?';
  const fw = window.D.bracket['r5m0t1'];
  
  const finaleHtml = `<div class="b-col" style="align-items:center;justify-content:center">
    <div class="b-col-title">Finale</div>
    <div class="b-match" style="width:100%">
      <div class="b-team${fw===ft1?' winner':''}" onclick="pickW(4,0,'${ft1.replace(/'/g,"\\'")}','${ft2.replace(/'/g,"\\'")}',1)">${ft1}</div>
      <div class="b-team${fw===ft2?' winner':''}" onclick="pickW(4,0,'${ft1.replace(/'/g,"\\'")}','${ft2.replace(/'/g,"\\'")}',2)">${ft2}</div>
    </div>
  </div>`;

  el.innerHTML=`<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Renseigne manuellement les équipes qualifiées à l'étape 0 si nécessaire (ou modifie à la volée), puis clique sur le vainqueur pour l'envoyer au tour suivant.</p>
  <div class="bracket-wrap">
    <div class="bracket-tree">
      ${leftCols}
      <div style="width:10px"></div>
      ${finaleHtml}
      <div style="width:10px"></div>
      ${rightCols}
    </div>
    ${fw?`<div style="text-align:center;margin-top:16px"><div style="font-size:24px;margin-bottom:6px">🏆</div><div class="b-champion" style="display:inline-block">${fw}</div></div>`:''}
  </div>`;
}

window.pickW = function(ri,mi,t1,t2,tn){
  const w=tn===1?t1:t2; if(w==='?') return;
  const nk=`r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
  window.D.bracket[nk]=w; window.save();
}

          ${pts>0?`<span class="pts-chip pts-${Math.min(pts,3)}">+${pts}</span>`:`<span class="pts-chip pts-0">—</span>`}

window.setAct = function(mid,f,v){ if(!window.D.actual[mid])window.D.actual[mid]={}; window.D.actual[mid][f]=v; window.save(); }
window.setBt = function(mid,p,f,v){ const k=mid+p; if(!window.D.pronos[k])window.D.pronos[k]={}; window.D.pronos[k][f]=v; window.save(); }

function calcPts(mid,pote){
  const bet=window.D.pronos[mid+pote]; const actual=window.D.actual[mid];
  if(!bet||!actual||actual.s1===''||actual.s2==='')return 0;
  const bs1=parseInt(bet.s1),bs2=parseInt(bet.s2),as1=parseInt(actual.s1),as2=parseInt(actual.s2);
  if(isNaN(bs1)||isNaN(bs2)||isNaN(as1)||isNaN(as2))return 0;
  let pts=0; const res=(a,b)=>a>b?1:a<b?-1:0;
  if(res(bs1,bs2)===res(as1,as2))pts=1;
  if(bs1===as1&&bs2===as2)pts=2;
  if(pts>=1&&bet.top&&actual.top&&bet.top.trim().toLowerCase()===actual.top.trim().toLowerCase())pts=3;
  return pts;
}
function calcLB(){ return window.POTES.map(p=>({name:p,pts:PRONO_MATCHES.reduce((s,m)=>s+calcPts(m.id,p),0)})).sort((a,b)=>b.pts-a.pts); }

window.removeRdv = function(ri){ if(window.D.rdvList.length<=1){window.D.rdvList[0]={id:'rdv_0',date:'',mois:'',match:'',heure:'',where:'',presents:{}}}else{window.D.rdvList.splice(ri,1)} window.save(); }

window.showTab('groupes');
</script>
