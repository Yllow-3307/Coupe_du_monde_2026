  <style>

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--color-background-secondary);color:var(--color-text-primary);padding:20px;max-width:1200px;margin:0 auto}
    
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8f9fa;
      --color-background-info: #e8f4fd;

    .hdr{padding:1.5rem 0 1rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}

    .tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);overflow-x:auto}
    .tab{padding:8px 12px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
    .tab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
    .tab:hover:not(.active){color:var(--color-text-primary)}
    
    .sec{display:none}.sec.active{display:block}
    .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:10px}
    
    .btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:none;color:var(--color-text-secondary)}
    .btn:hover{background:var(--color-background-secondary)}
    .btn-primary{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
    
    .section-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px}
    .grp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    .grp-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 12px}
    .grp-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px}
    
    .team-row{display:flex;align-items:center;gap:6px;padding:4px 0 4px 5px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
    .team-row:last-child{border-bottom:none}
    .q1{border-left:3px solid #1D9E75}.q3{border-left:3px solid #EF9F27}.qn{border-left:3px solid transparent}
    
    .pts-cell{min-width:22px;text-align:right;color:var(--color-text-secondary);font-size:12px;cursor:pointer;padding:1px 3px;border-radius:3px}
    .pts-cell:hover{background:var(--color-background-secondary)}
    
    .score-in{width:28px;height:26px;text-align:center;font-size:13px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary)}
    .inp-sm{height:28px;font-size:13px;padding:0 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary)}
    
    .filter-container{display:flex;gap:10px;margin-bottom:15px;background:var(--color-background-primary);padding:10px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);flex-wrap:wrap}
    .select-sm{height:28px;font-size:12px;padding:0 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}

    .leaderboard{display:flex;flex-direction:column;gap:6px}
    .lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg)}

    .prog-bet-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}

    .pts-chip{font-size:11px;padding:1px 6px;border-radius:8px;font-weight:500;margin-left:6px}

    .stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}

    .stat-sub{font-size:11px;color:var(--color-text-secondary)}
    
    .bracket-wrap{overflow-x:auto;padding-bottom:12px}
    .bracket-tree{display:flex;align-items:center;gap:0;min-width:1100px}
    .b-col{display:flex;flex-direction:column;justify-content:space-around;padding:0 4px}
    .b-col-title{font-size:10px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;text-align:center;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:8px;white-space:nowrap}

    .b-team.winner{color:var(--color-text-success);font-weight:500;background:var(--color-background-success)}
    
    .teams-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
    .team-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
    .team-card-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer}

    .player-row:last-child{border-bottom:none}
    .player-num{min-width:20px;color:var(--color-text-tertiary);font-size:11px}
    .player-pos{font-size:10px;padding:1px 5px;border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-secondary)}
    
    .rdv-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px}
    .rdv-date-box{background:var(--color-background-info);border-radius:var(--border-radius-md);padding:6px 10px;text-align:center;min-width:52px}
    .rdv-date-d{font-size:18px;font-weight:500;color:var(--color-text-info)}
    .rdv-date-m{font-size:10px;color:var(--color-text-info)}
    .sr-only {position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
    
    .bracket-wrapper {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .b-side { 
      display: flex; 
      flex-direction: row; /* Aligne les colonnes côte à côte */
    }
    .b-col { 
      display: flex; 
      flex-direction: column; 
      justify-content: space-around; /* C'est la clé : force l'espacement égal */
      height: 600px; /* Donne une hauteur fixe à ton bracket */
    }
    .b-match { 
      margin: 10px 0; 
      border: 1px solid #ddd; 
      padding: 5px; 
    }
    /* Amélioration visuelle : chemin et interactivité */
    .b-match { background: white; border: 1px solid #ddd; padding: 5px; border-radius: 4px; transition: all 0.2s; }
    .b-team { cursor: pointer; padding: 4px; border-bottom: 1px solid #eee; border-radius: 2px; }

    /* ===== LOGIN SCREEN ===== */
    #login-screen{position:fixed;inset:0;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;z-index:9999}
    #login-screen.hidden{display:none}
    .login-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:32px 28px;width:320px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
    .login-box h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
    .login-box p{font-size:13px;color:var(--color-text-secondary);margin-bottom:24px}
    .login-field{margin-bottom:12px}
    .login-field label{font-size:12px;font-weight:500;color:var(--color-text-secondary);display:block;margin-bottom:4px}
    .login-field input{width:100%;height:36px;padding:0 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px}
    .login-field input:focus{outline:none;border-color:var(--color-text-info)}
    .login-btn{width:100%;height:36px;background:var(--color-text-primary);color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
    .login-btn:hover{opacity:0.85}
    .login-err{font-size:12px;color:#c92a2a;margin-top:8px;text-align:center;min-height:16px}
    /* User bar */
    .user-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:12px;font-size:12px}
    .user-bar-name{flex:1;font-weight:500;color:var(--color-text-primary)}
    .user-bar-role{padding:2px 7px;border-radius:8px;font-size:11px;font-weight:500}
    .role-admin{background:#FAEEDA;color:#633806}
    .role-user{background:var(--color-background-info);color:var(--color-text-info)}
    .logout-btn{font-size:11px;padding:3px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:none;color:var(--color-text-secondary)}
    .logout-btn:hover{background:var(--color-background-secondary)}
    /* Champs désactivés pour non-admin */
    .readonly-field{pointer-events:none;opacity:0.5}

  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h2>🏆 CDM 2026</h2>
    <p>Connecte-toi pour accéder au tracker</p>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="ton@email.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">Se connecter</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- USER BAR (shown when logged in) -->
<div class="user-bar" id="user-bar" style="display:none">
  <span style="font-size:16px" id="user-avatar">👤</span>
  <span class="user-bar-name" id="user-name">—</span>
  <span class="user-bar-role" id="user-role-badge">—</span>
  <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout" aria-hidden="true"></i> Déconnexion</button>
</div>

<h2 class="sr-only">Tracker Coupe du Monde 2026 — groupes, bracket, pronos, stats équipes, fiches joueurs et RDV soirées</h2>

<div class="hdr">
  <span style="font-size:28px">🏆</span>
  <div>
    <h1>Coupe du Monde FIFA 2026</h1>
    <p>11 juin – 19 juillet · USA, Canada, Mexique · 48 équipes</p>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('groupes')"><i class="ti ti-table" aria-hidden="true"></i> Groupes</button>
  <button class="tab" onclick="showTab('matchs')"><i class="ti ti-calendar" aria-hidden="true"></i> Matchs</button>
  <button class="tab" onclick="showTab('bracket')"><i class="ti ti-tournament" aria-hidden="true"></i> Bracket</button>
  <button class="tab" onclick="showTab('pronos')"><i class="ti ti-podium" aria-hidden="true"></i> Pronos</button>
  <button class="tab" onclick="showTab('stats')"><i class="ti ti-chart-bar" aria-hidden="true"></i> Stats</button>
  <button class="tab" onclick="showTab('equipes')"><i class="ti ti-shirt" aria-hidden="true"></i> Équipes</button>
  <button class="tab" onclick="showTab('rdv')"><i class="ti ti-map-pin" aria-hidden="true"></i> RDV</button>
</div>

<div id="groupes" class="sec active"></div>
<div id="matchs" class="sec"></div>
<div id="bracket" class="sec"></div>
<div id="pronos" class="sec"></div>
<div id="stats" class="sec"></div>
<div id="equipes" class="sec"></div>
<div id="rdv" class="sec"></div>

<script>

// ===== FIREBASE AUTH & FIRESTORE =====
const ADMIN_EMAIL = "louisvandamme2505@gmail.com"; // ← ton email admin

// Mapping email → nom affiché
const EMAIL_TO_POTE = {
  "louisvandamme2505@gmail.com": "Louis",
  "alban@cdm2026.fr": "Alban",
  "lino@cdm2026.fr": "Lino",
  "maxime@cdm2026.fr": "Maxime",
  "simon@cdm2026.fr": "Simon",
  "theo@cdm2026.fr": "Theo",
  "titouan@cdm2026.fr": "Titouan",
  "victor@cdm2026.fr": "Victor",
};

let currentUser = null;
let currentPote = null;
let isAdmin = false;
let unsubscribers = [];

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = 'Connexion...';
  window._auth.signInWithEmailAndPassword(email, pwd)
    .then(() => { errEl.textContent = ''; })
    .catch(e => {
      const msgs = { 'auth/user-not-found':'Compte introuvable', 'auth/wrong-password':'Mot de passe incorrect', 'auth/invalid-email':'Email invalide', 'auth/invalid-credential':'Email ou mot de passe incorrect' };
      errEl.textContent = msgs[e.code] || 'Erreur : ' + e.message;
    });
}

function doLogout() {
  window._auth.signOut();
}

document.getElementById('login-pwd').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// Auth state listener - runs when Firebase is ready
window.addEventListener('load', () => {
  setTimeout(() => {
    if (!window._auth) { console.error('Firebase not ready'); return; }
    window._auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        currentPote = EMAIL_TO_POTE[user.email] || user.email.split('@')[0];
        isAdmin = user.email === ADMIN_EMAIL;
        // Hide login, show app
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('user-bar').style.display = 'flex';
        document.getElementById('user-name').textContent = currentPote;
        document.getElementById('user-role-badge').textContent = isAdmin ? 'Admin' : 'Joueur';
        document.getElementById('user-role-badge').className = 'user-bar-role ' + (isAdmin ? 'role-admin' : 'role-user');
        // Subscribe to Firestore
        subscribeFirestore();
        renderGroups();
      } else {
        currentUser = null; currentPote = null; isAdmin = false;
        // Unsubscribe all listeners
        unsubscribers.forEach(u => u()); unsubscribers = [];
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('user-bar').style.display = 'none';
      }
    });
  }, 800);
});

function subscribeFirestore() {
  const db = window._db;
  // Listen to shared data (scores, bracket, stats, rdv, grouppts)
  const sharedUnsub = db.collection('shared').doc('data').onSnapshot(snap => {
    if (snap.exists()) {
      const data = snap.data();
      D.scores = data.scores || {};
      D.bracket = data.bracket || {};
      D.teamStats = data.teamStats || TEAMS_DATA.map(t=>({flag:t.flag,name:t.name,mvp:'',goals:0,played:0,cs:0}));
      D.rdvList = data.rdvList || [{id:'rdv_0',date:'',mois:'',match:'',heure:'',where:'',presents:{}}];
      D.pts = data.pts || {};
      // Re-render current tab
      const activeTab = document.querySelector('.tab.active');
      if (activeTab) activeTab.click();
    }
  });
  unsubscribers.push(sharedUnsub);

  // Listen to pronos of current user
  const pronosUnsub = db.collection('pronos').doc(currentPote).onSnapshot(snap => {
    if (snap.exists()) {
      D.pronos = D.pronos || {};
      const data = snap.data();
      Object.assign(D.pronos, data.bets || {});
    }
  });
  unsubscribers.push(pronosUnsub);

  // If admin, also listen to all potes pronos
  if (isAdmin) {
    POTES.forEach(pote => {
      const u = db.collection('pronos').doc(pote).onSnapshot(snap => {
        if (snap.exists()) {
          D.pronos = D.pronos || {};
          Object.assign(D.pronos, snap.data().bets || {});
        }
      });
      unsubscribers.push(u);
    });
    // Listen to actual scores
    const actualUnsub = db.collection('shared').doc('actuals').onSnapshot(snap => {
      if (snap.exists()) { D.actual = snap.data().actuals || {}; }
    });
    unsubscribers.push(actualUnsub);
  } else {
    // Non-admin: load actuals once
    db.collection('shared').doc('actuals').get().then(snap => {
      if (snap.exists()) D.actual = snap.data().actuals || {};
    });
  }
}

async function save() {
  if (!currentUser) { localStorage.setItem('wc26v3', JSON.stringify(D)); return; }
  if (!isAdmin) return;
  try {
    await window._db.collection('shared').doc('data').set({
      scores: D.scores || {},
      bracket: D.bracket || {},
      teamStats: D.teamStats || [],
      rdvList: D.rdvList || [],
      pts: D.pts || {}
    });
  } catch(e) { console.error('Save error:', e); }
}

async function saveActuals() {
  if (!isAdmin) return;
  try {
    await window._db.collection('shared').doc('actuals').set({ actuals: D.actual || {} });
  } catch(e) { console.error(e); }
}

async function saveBet(matchId, pote, field, value) {
  if (!currentUser) return;
  if (pote !== currentPote && !isAdmin) return;
  const key = matchId + pote;
  if (!D.pronos[key]) D.pronos[key] = {s1:'', s2:'', top:''};
  D.pronos[key][field] = value;
  try {
    const ref = window._db.collection('pronos').doc(pote);
    const snap = await ref.get();
    const existing = snap.exists ? (snap.data().bets || {}) : {};
    if (!existing[key]) existing[key] = {s1:'',s2:'',top:''};
    existing[key][field] = value;
    await ref.set({ bets: existing });

  currentFilterPhase = document.getElementById('filter-phase').value;

function renderBracket() {
  const el = document.getElementById('bracket');
  if (!el) return;

  // Hauteur totale du bracket (hors titres). Toutes les colonnes partagent cette même hauteur.
  const TOTAL_H = 640; // px
  const MATCH_H = 46;  // px — hauteur d'un b-match (2 équipes × 23px)

  // Génère les matchs d'une colonne avec margin-top calculé pour centrer chaque match
  // à cheval sur les deux matchs parents du round précédent.
  // n = nombre de matchs dans cette colonne
  // La formule : slot = TOTAL_H / n, premier match centré dans son slot
  function colMatches(side, phase, n, startIdx) {
    const slotH = TOTAL_H / n;
    const firstTop = (slotH - MATCH_H) / 2;
    const gap = slotH - MATCH_H;
    let html = '';
    for (let i = 0; i < n; i++) {
      const mi = startIdx + i;
      const k = `${side}_${phase}_${mi}`;
      const t1 = D.bracket[k+'_t1'] || '?';
      const t2 = D.bracket[k+'_t2'] || '?';
      const winner = D.bracket[k+'_w'];
      const mt = i === 0 ? firstTop : gap;
      html += `<div class="b-match" style="margin-top:${mt}px" data-key="${k}">
        <div class="b-team${winner===t1&&t1!=='?'?' winner':''}" onclick="pickWinner('${k}',1)">${t1}</div>
        <div class="b-team${winner===t2&&t2!=='?'?' winner':''}" onclick="pickWinner('${k}',2)">${t2}</div>
      </div>`;
    }
    return html;
  }

  function col(side, phase, label, n, startIdx=0) {
    return `<div class="b-col" style="min-width:120px;padding:0 4px">
      <div class="b-col-title" style="height:28px;display:flex;align-items:center;justify-content:center">${label}</div>
      <div style="height:${TOTAL_H}px;display:flex;flex-direction:column">
        ${colMatches(side, phase, n, startIdx)}
      </div>
    </div>`;
  }

  // Finale au centre
  const fk = 'finale';
  const ft1 = D.bracket[fk+'_t1'] || '?';
  const ft2 = D.bracket[fk+'_t2'] || '?';
  const fw  = D.bracket[fk+'_w'];
  const finaleCol = `<div class="b-col" style="min-width:120px;padding:0 4px">
    <div class="b-col-title" style="height:28px;display:flex;align-items:center;justify-content:center">Finale</div>
    <div style="height:${TOTAL_H}px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px">
      <div class="b-match">
        <div class="b-team${fw===ft1&&ft1!=='?'?' winner':''}" onclick="pickWinner('${fk}',1)">${ft1}</div>
        <div class="b-team${fw===ft2&&ft2!=='?'?' winner':''}" onclick="pickWinner('${fk}',2)">${ft2}</div>
      </div>
      ${fw && fw !== '?' ? `<div style="text-align:center;margin-top:8px"><div style="font-size:20px">🏆</div><div style="font-size:11px;font-weight:500;color:var(--color-text-primary);padding:4px 8px;background:var(--color-background-warning);border-radius:6px;margin-top:4px">${fw}</div></div>` : ''}
    </div>
  </div>`;

  el.innerHTML = `
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">
      Renseigne les équipes dans les cases des 16es, puis clique sur le vainqueur de chaque match pour faire avancer le bracket.
    </p>
    <div style="overflow-x:auto;padding-bottom:12px">
      <div style="display:flex;align-items:flex-start;gap:0;min-width:1400px">
        <div style="display:flex">
          ${col('L','16','16es',8,0)}
          ${col('L','8','8es',4,0)}
          ${col('L','QF','Quarts',2,0)}
          ${col('L','SF','Demies',1,0)}
        </div>
        <div style="width:8px"></div>
        ${finaleCol}
        <div style="width:8px"></div>
        <div style="display:flex">
          ${col('R','SF','Demies',1,0)}
          ${col('R','QF','Quarts',2,0)}
          ${col('R','8','8es',4,0)}
          ${col('R','16','16es',8,0)}
        </div>
      </div>
    </div>`;
}

function pickWinner(key, teamNum) {
  const t1 = D.bracket[key+'_t1'] || '?';
  const t2 = D.bracket[key+'_t2'] || '?';
  const winner = teamNum === 1 ? t1 : t2;
  if (winner === '?') return;
  D.bracket[key+'_w'] = winner;

  // Propager le vainqueur dans le match suivant
  const parts = key.split('_'); // side, phase, idx
  const side = parts[0];
  const phase = parts[1];
  const idx = parseInt(parts[2]) || 0;

  const nextPhase = {
    '16':'8','8':'QF','QF':'SF','SF':'finale'
  }[phase];
  if (!nextPhase) { save(); renderBracket(); return; }

  if (nextPhase === 'finale') {
    const slot = side === 'L' ? '_t1' : '_t2';
    D.bracket['finale'+slot] = winner;
  } else {
    const nextIdx = Math.floor(idx / 2);
    const slot = idx % 2 === 0 ? '_t1' : '_t2';
    D.bracket[`${side}_${nextPhase}_${nextIdx}${slot}`] = winner;
  }
  save();
  renderBracket();
}

function setActual(mid,f,v){
  if(!isAdmin) return; // Only admin sets actual scores
  if(!D.actual[mid]) D.actual[mid]={};
  D.actual[mid][f]=v;
  saveActuals();
  // Recalculate pronos display
  const el = document.getElementById('pronos');
  if(el && el.classList.contains('active')) renderPronos();
}
function setBet(mid,p,f,v){
  if(!currentUser) return;
  if(p !== currentPote && !isAdmin) return; // Can only edit own bets
  saveBet(mid, p, f, v);
}
function calcPts(matchId, pote){
  const actual = D.actual[matchId] || {s1:'', s2:'', top:''};
  const bet = D.pronos[matchId+pote] || {s1:'', s2:'', top:''};
  
  let pts = 0;
  
  // Score exact = 2 pts
  if(bet.s1 === actual.s1 && bet.s2 === actual.s2){
    pts += 2;
  }
  // Juste le résultat = 1 pt
  else if((bet.s1 > bet.s2 && actual.s1 > actual.s2) ||
          (bet.s1 < bet.s2 && actual.s1 < actual.s2) ||
          (bet.s1 == bet.s2 && actual.s1 == actual.s2)){
    pts += 1;
  }
  
  // Buteur exact = 3 pts bonus
  if(actual.top && bet.top){
    // Normalise les noms (minuscules, pas d'accents)
    const actualTop = actual.top.toLowerCase().trim();
    const betTop = bet.top.toLowerCase().trim();
    
    // Vérification simple : si le nom est dans la liste des buteurs
    if(actualTop.includes(betTop) || betTop.includes(actualTop)){
      pts += 3;
    }
  }
  
  return pts;
}
function calcLB(){
  return POTES.map(p=>({name:p,pts:PRONO_MATCHES.reduce((s,m)=>s+calcPts(m.id,p),0)})).sort((a,b)=>b.pts-a.pts);
}

function getGroupeClassement(groupe) {
  // Récupère les équipes du groupe
  const equipes = GROUPS[groupe].teams.map(t => ({
    flag: t[0],
    nom: t[1],
    pt: 0,
    bu: 0,
    ec: 0,
    diff: 0
  }));
  
  // Cherche tous les matchs de ce groupe
  MATCHS_DATA.forEach((m, idx) => {
    if (m.g !== groupe) return;
    
    const s1 = D.scores[idx + 'a'];
    const s2 = D.scores[idx + 'b'];
    
    // Si pas de scores rentrés, ignore
    if (s1 === undefined || s2 === undefined || s1 === '' || s2 === '') return;
    
    const score1 = parseInt(s1);
    const score2 = parseInt(s2);
    
    // Trouve les deux équipes dans le groupe
    const team1 = equipes.find(t => m.t1.includes(t.nom));
    const team2 = equipes.find(t => m.t2.includes(t.nom));
    
    if (!team1 || !team2) return;
    
    // Compte les buts
    team1.bu += score1;
    team1.ec += score2;
    team2.bu += score2;
    team2.ec += score1;
    
    // Compte les points
    if (score1 > score2) {
      team1.pt += 3; // Victoire
    } else if (score1 < score2) {
      team2.pt += 3; // Victoire
    } else {
      team1.pt += 1; // Nul
      team2.pt += 1; // Nul
    }
  });
  
  // Calcule la différence de buts
  equipes.forEach(t => {
    t.diff = t.bu - t.ec;
  });
  
  // Trie par : points (DESC), différence de buts (DESC), buts marqués (DESC)
  return equipes.sort((a, b) => {
    if (b.pt !== a.pt) return b.pt - a.pt;
    if (b.diff !== a.diff) return b.diff - a.diff;
    return b.bu - a.bu;
  });
}

function toggleRdv(ri,p){if(!D.rdvList[ri].presents)D.rdvList[ri].presents={};D.rdvList[ri].presents[p]=(D.rdvList[ri].presents[p]||0)===1?0:1;save();renderRdv()}
function addRdv(){D.rdvList.push({id:'rdv_'+Date.now(),date:'',mois:'',match:'',heure:'',where:'',presents:{}});save();renderRdv()}
function removeRdv(ri){if(D.rdvList.length<=1){D.rdvList[0]={id:'rdv_0',date:'',mois:'',match:'',heure:'',where:'',presents:{}}}else{D.rdvList.splice(ri,1)}save();renderRdv()}

function showTab(id){
  const tabs=['groupes','matchs','bracket','pronos','stats','equipes','rdv'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===id));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('active',s.id===id));
  const renders={groupes:renderGroups,matchs:renderMatchs,bracket:renderBracket,pronos:renderPronos,stats:renderStats,equipes:renderEquipes,rdv:renderRdv};
  if(renders[id])renders[id]();
}
