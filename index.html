    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    .hdr p { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }

    .btn:hover { background: var(--color-background-secondary); }
    .btn-primary { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
    .section-title { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }
    
    /* Grille des Groupes */
    .grp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    .grp-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 10px 12px; }
    .grp-title { font-size: 12px; font-weight: 600; color: var(--color-text-primary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--color-border-tertiary); }

    .cell-val { width: 22px; text-align: center; color: var(--color-text-secondary); }

// Fonction de calcul automatique des stats des groupes en fonction des scores saisis
function computeGroupStandings() {
  const standings = {};
  
  // Initialisation de la structure pour chaque pays
  Object.entries(GROUPS).forEach(([g, data]) => {
    standings[g] = data.teams.map(t => ({
      flag: t[0],
      name: t[1],
      played: 0,
      diff: 0,
      pts: 0
    }));
  });

  // Parcours des matchs de poule pour calculer les totaux
  MATCHS_DATA.forEach((m) => {
    if (!m.g) return; // Ignore la finale ou les matchs sans groupe
    const s1 = D.scores[m.id + 'a'];
    const s2 = D.scores[m.id + 'b'];

    // Si les deux scores sont saisis (non vides)
    if (s1 !== undefined && s2 !== undefined && s1 !== '' && s2 !== '') {
      const score1 = parseInt(s1);
      const score2 = parseInt(s2);
      const groupList = standings[m.g];
      
      if (groupList) {
        const team1 = groupList.find(t => t.name === m.t1);
        const team2 = groupList.find(t => t.name === m.t2);

        if (team1 && team2) {
          team1.played += 1;
          team2.played += 1;
          team1.diff += (score1 - score2);
          team2.diff += (score2 - score1);

          if (score1 > score2) {
            team1.pts += 3;
          } else if (score1 < score2) {
            team2.pts += 3;
          } else {
            team1.pts += 1;
            team2.pts += 1;
          }
        }
      }
    }
  });

  // Tri automatique de chaque groupe (par points, puis différence de buts)
  Object.keys(standings).forEach(g => {
    standings[g].sort((a, b) => b.pts - a.pts || b.diff - a.diff);
  });

  return standings;
}

function renderBracket(){
  const el=document.getElementById('bracket');
  function bCol(slots, ri, offset){
    const spacer = Math.pow(2,ri)*6; let html = '';
    for(let i=0;i<slots;i++){
      const mi = offset + i;
      const k1=`r${ri}m${mi}t1`, k2=`r${ri}m${mi}t2`;
      const t1=D.bracket[k1]||(ri===0?`Éq.${mi*2+1}`:'?');
      const t2=D.bracket[k2]||(ri===0?`Éq.${mi*2+2}`:'?');
      const nk=`r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
      const w=D.bracket[nk];
      html+=`<div class="b-match">
        <div class="b-team${w===t1?' winner':''}" id="brkt-${ri}-${mi}-1">${t1}</div>
        <div class="b-team${w===t2?' winner':''}" id="brkt-${ri}-${mi}-2">${t2}</div>
      </div>`;
      if(i<slots-1) html+=`<div style="height:${spacer}px"></div>`;
    }
    return html;
  }

  function bColRight(slots, ri){
    const spacer = Math.pow(2,ri)*6; let html='';
    for(let i=0;i<slots;i++){
      const mi = Math.pow(2,3-ri)*1 + i;
      const k1=`r${ri}m${mi}t1`, k2=`r${ri}m${mi}t2`;
      const t1=D.bracket[k1]||(ri===0?`Éq.${mi*2+1}`:'?');
      const t2=D.bracket[k2]||(ri===0?`Éq.${mi*2+2}`:'?');
      const nk=`r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
      const w=D.bracket[nk];
      html+=`<div class="b-match">
        <div class="b-team${w===t1?' winner':''}" id="brkt-${ri}-${mi}-1">${t1}</div>
        <div class="b-team${w===t2?' winner':''}" id="brkt-${ri}-${mi}-2">${t2}</div>
      </div>`;
      if(i<slots-1) html+=`<div style="height:${spacer}px"></div>`;
    }
    return html;
  }

  const champion = D.bracket['r5m0t1'] || null;
  const colLabels = ["32es","16es","Quarts","Demies"];

  let leftCols = '';
  for(let r=0;r<4;r++) {
    leftCols += `<div class="b-col" style="min-width:120px"><div class="b-col-title">${colLabels[r]}</div><div style="display:flex;flex-direction:column">${bCol(8/Math.pow(2,r),r,0)}</div></div>`;
  }
  let rightCols = '';
  for(let r=3;r>=0;r--) {
    rightCols += `<div class="b-col" style="min-width:120px"><div class="b-col-title">${colLabels[r]}</div><div style="display:flex;flex-direction:column">${bColRight(8/Math.pow(2,3-r),r)}</div></div>`;
  }

  const ft1=D.bracket['r4m0t1']||'?'; const ft2=D.bracket['r4m0t2']||'?'; const fw=D.bracket['r5m0t1'];
  const finaleHtml=`<div class="b-col" style="min-width:120px;align-items:center"><div class="b-col-title">Finale</div><div class="b-match"><div class="b-team${fw===ft1?' winner':''}" id="brkt-4-0-1">${ft1}</div><div class="b-team${fw===ft2?' winner':''}" id="brkt-4-0-2">${ft2}</div></div></div>`;

  el.innerHTML=`<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Clique sur le vainqueur pour le faire avancer.</p>
  <div class="bracket-wrap"><div class="bracket-tree">${leftCols}<div style="width:8px"></div>${finaleHtml}<div style="width:8px"></div>${rightCols}</div>
    ${champion?`<div style="text-align:center;margin-top:16px"><div style="font-size:24px;margin-bottom:6px">🏆</div><div style="display:inline-block;padding:8px 20px;background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-lg);font-weight:500;color:var(--color-text-primary);font-size:14px">${champion}</div></div>`:''}
  </div>`;

  // Attachement dynamique des clics
  const pickW=(ri,mi,t)=>{
    D.bracket[`r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`]=t;
    renderBracket(); syncToFirebase();
  };
  for(let r=0;r<4;r++){
    for(let i=0;i<(8/Math.pow(2,r));i++){
      const t1=D.bracket[`r${r}m${i}t1`]||`Éq.${i*2+1}`; const t2=D.bracket[`r${r}m${i}t2`]||`Éq.${i*2+2}`;
      const b1=document.getElementById(`brkt-${r}-${i}-1`); if(b1) b1.onclick=()=>pickW(r,i,t1);
      const b2=document.getElementById(`brkt-${r}-${i}-2`); if(b2) b2.onclick=()=>pickW(r,i,t2);
    }
    for(let i=0;i<(8/Math.pow(2,3-r));i++){
      const mi = Math.pow(2,3-r)*1 + i;
      const t1=D.bracket[`r${r}m${mi}t1`]||`Éq.${mi*2+1}`; const t2=D.bracket[`r${r}m${mi}t2`]||`Éq.${mi*2+2}`;
      const b1=document.getElementById(`brkt-${r}-${mi}-1`); if(b1) b1.onclick=()=>pickW(r,mi,t1);
      const b2=document.getElementById(`brkt-${r}-${mi}-2`); if(b2) b2.onclick=()=>pickW(r,mi,t2);
    }
  }
  const f1=document.getElementById('brkt-4-0-1'); if(f1) f1.onclick=()=>pickW(4,0,ft1);
  const f2=document.getElementById('brkt-4-0-2'); if(f2) f2.onclick=()=>pickW(4,0,ft2);
}

function renderPronos(){
  const el=document.getElementById('pronos');
  const lb=POTES.map(p=>({name:p,pts:PRONO_MATCHES.reduce((s,m)=>{
    const bet=D.pronos[m.id+p]; const act=D.actual[m.id];
    if(!bet||!act||act.s1===''||act.s2==='')return s;
    const bs1=parseInt(bet.s1), bs2=parseInt(bet.s2), as1=parseInt(act.s1), as2=parseInt(act.s2);
    if(isNaN(bs1)||isNaN(bs2)||isNaN(as1)||isNaN(as2))return s;
    let pts=0; const res=(a,b)=>a>b?1:a<b?-1:0;
    if(res(bs1,bs2)===res(as1,as2))pts=1; if(bs1===as1&&bs2===as2)pts=2;
    if(pts>=1&&bet.top&&act.top&&bet.top.trim().toLowerCase()===act.top.trim().toLowerCase())pts=3;
    return s+pts;
  },0)})).sort((a,b)=>b.pts-a.pts);

      </div>`;}).join('')}</div>
  </div>
  <div class="section-title" style="margin-top:1.5rem">Pronos par match</div>
  <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px"><span class="pts-chip pts-1">1 pt</span> bon résultat &nbsp;<span class="pts-chip pts-2">2 pts</span> score exact &nbsp;<span class="pts-chip pts-3">3 pts</span> + buteur</div>
  ${PRONO_MATCHES.map(m=>{
    const actual=D.actual[m.id]||{s1:'',s2:'',top:''};
    return`<div class="prog-match">
      <div class="prog-match-hdr"><span style="font-weight:500;color:var(--color-text-primary)">${m.label}</span><span>${m.date} · ${m.group}</span></div>
      <div style="padding:8px 12px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">Score réel :</div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <input class="score-in" id="act-${m.id}-s1" type="number" min="0" placeholder="—" value="${actual.s1}" style="width:32px;height:28px">
          <span style="color:var(--color-text-tertiary)">–</span>
          <input class="score-in" id="act-${m.id}-s2" type="number" min="0" placeholder="—" value="${actual.s2}" style="width:32px;height:28px">
          <input class="inp-sm" id="act-${m.id}-top" placeholder="Top buteur..." value="${actual.top||''}" style="width:130px">
        </div>
      </div>
      <div>${POTES.map((pote)=>{
        const bet=D.pronos[m.id+pote]||{s1:'',s2:'',top:''};
        let pts=0;
        if(actual.s1!==''&&actual.s2!==''){
          const bs1=parseInt(bet.s1), bs2=parseInt(bet.s2), as1=parseInt(actual.s1), as2=parseInt(actual.s2);
          if(!isNaN(bs1)&&!isNaN(bs2)&&!isNaN(as1)&&!isNaN(as2)){
            const res=(a,b)=>a>b?1:a<b?-1:0; if(res(bs1,bs2)===res(as1,as2))pts=1; if(bs1===as1&&bs2===as2)pts=2;
            if(pts>=1&&bet.top&&actual.top&&bet.top.trim().toLowerCase()===actual.top.trim().toLowerCase())pts=3;
          }
        }
        return`<div class="prog-bet-row">
          <span style="min-width:65px;color:var(--color-text-secondary)">${pote}</span>
          <input class="score-in" id="bet-${m.id}-${pote}-s1" type="number" placeholder="?" value="${bet.s1}" style="width:28px;height:24px;font-size:12px">
          <span style="color:var(--color-text-tertiary);font-size:11px">–</span>
          <input class="score-in" id="bet-${m.id}-${pote}-s2" type="number" placeholder="?" value="${bet.s2}" style="width:28px;height:24px;font-size:12px">
          <input class="inp-sm" id="bet-${m.id}-${pote}-top" placeholder="buteur..." value="${bet.top||''}" style="width:90px;height:24px;font-size:12px">
          ${pts>0?`<span class="pts-chip pts-${Math.min(pts,3)}">+${pts}</span>`:`<span class="pts-chip pts-0">—</span>`}
        </div>`;}).join('')}</div>
    </div>`;}).join('')}`;

  // Binding Inputs Pronos
  PRONO_MATCHES.forEach(m=>{
    if(!D.actual[m.id]) D.actual[m.id]={s1:'',s2:'',top:''};
    const s1=document.getElementById(`act-${m.id}-s1`); if(s1) s1.oninput=e=>{ D.actual[m.id].s1=e.target.value; syncToFirebase();};

      const bs1=document.getElementById(`bet-${m.id}-${pote}-s1`); if(bs1) bs1.oninput=e=>{ D.pronos[m.id+pote].s1=e.target.value; syncToFirebase();};
      const bs2=document.getElementById(`bet-${m.id}-${pote}-s2`); if(bs2) bs2.oninput=e=>{ D.pronos[m.id+pote].s2=e.target.value; syncToFirebase();};
      const btop=document.getElementById(`bet-${m.id}-${pote}-top`); if(btop) btop.oninput=e=>{ D.pronos[m.id+pote].top=e.target.value; syncToFirebase();};
    });
  });
}

}

window.addRdv = () => { D.rdvList.push({id:'rdv_'+Date.now(),date:'',mois:'',match:'',heure:'',where:'',presents:{}}); renderRdv(); syncToFirebase(); };
window.removeRdv = (ri) => { if(D.rdvList.length<=1){D.rdvList[0]={id:'rdv_0',date:'',mois:'',match:'',heure:'',where:'',presents:{}}}else{D.rdvList.splice(ri,1)} renderRdv(); syncToFirebase(); };
window.toggleRdv = (ri,p) => { if(!D.rdvList[ri].presents)D.rdvList[ri].presents={}; D.rdvList[ri].presents[p]=(D.rdvList[ri].presents[p]||0)===1?0:1; renderRdv(); syncToFirebase(); };

function renderRdv(){
  const el=document.getElementById('rdv');
  el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <p style="font-size:12px;color:var(--color-text-secondary)">Organise vos soirées matchs. Clique sur ton avatar pour valider ta présence.</p>
    <button class="btn btn-primary" onclick="window.addRdv()"><i class="ti ti-plus"></i> Ajouter</button>
  </div>
  ${D.rdvList.map((r,ri)=>{
    const pres=r.presents||{}; const count=Object.values(pres).filter(v=>v===1).length;
    return`<div class="rdv-card">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
        <div class="rdv-date-box">
          <div class="rdv-date-d"><input type="text" id="rdv-d-${ri}" value="${r.date||''}" placeholder="?" style="width:36px;background:none;border:none;text-align:center;font-size:16px;font-weight:500;color:var(--color-text-info);outline:none"></div>
          <div class="rdv-date-m"><input type="text" id="rdv-m-${ri}" value="${r.mois||''}" placeholder="MOI" style="width:40px;background:none;border:none;text-align:center;font-size:10px;color:var(--color-text-info);outline:none;text-transform:uppercase"></div>
        </div>
        <div style="flex:1">
          <input class="inp-sm" id="rdv-ma-${ri}" value="${r.match||''}" placeholder="Quel match ?" style="width:100%;margin-bottom:5px">
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <input class="inp-sm" id="rdv-h-${ri}" value="${r.heure||''}" placeholder="Heure" style="width:70px">
            <input class="inp-sm" id="rdv-w-${ri}" value="${r.where||''}" placeholder="Où ? (bar, chez...)" style="flex:1">
          </div>
        </div>
        <button class="btn" onclick="window.removeRdv(${ri})" style="padding:4px 8px;color:var(--color-text-danger)"><i class="ti ti-trash" style="font-size:14px"></i></button>
      </div>
      <div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">${POTES.map((p,pi)=>{
          const state=pres[p]||0;
          return`<div onclick="window.toggleRdv(${ri},'${p}')" title="${p}" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;cursor:pointer;background:${AV_BG[pi]};color:${AV_TX[pi]};opacity:${state?'1':'0.35'};border:${state?'2px solid #1D9E75':'1.5px solid transparent'}">${p.substring(0,2)}</div>`;
        }).join('')}</div>
        <span style="font-size:12px;color:var(--color-text-secondary)">${count>0?count+' présent'+(count>1?'s':''):'Personne encore'}</span>
      </div>
    </div>`;}).join('')}`;

  D.rdvList.forEach((_,ri)=>{
    document.getElementById(`rdv-d-${ri}`).oninput=e=>{ D.rdvList[ri].date=e.target.value; syncToFirebase(); };
    document.getElementById(`rdv-m-${ri}`).oninput=e=>{ D.rdvList[ri].mois=e.target.value; syncToFirebase(); };
    document.getElementById(`rdv-ma-${ri}`).oninput=e=>{ D.rdvList[ri].match=e.target.value; syncToFirebase(); };
    document.getElementById(`rdv-h-${ri}`).oninput=e=>{ D.rdvList[ri].heure=e.target.value; syncToFirebase(); };
    document.getElementById(`rdv-w-${ri}`).oninput=e=>{ D.rdvList[ri].where=e.target.value; syncToFirebase(); };
  });
}

// Gestion globale de la navigation des onglets reliée à l'objet window
window.showTab = function(id) {
  currentTabId = id;
  const tabs = ['groupes','matchs','bracket','pronos','stats','equipes','rdv'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', tabs[i] === id));
  document.querySelectorAll('.sec').forEach(s => s.classList.toggle('active', s.id === id));
  
  const renders = { groupes:renderGroups, matchs:renderMatchs, bracket:renderBracket, pronos:renderPronos, stats:renderStats, equipes:renderEquipes, rdv:renderRdv };
  if(renders[id]) renders[id]();
}

// Écouteur en temps réel Firebase Firestore
onSnapshot(docRef, (docSnap) => {
  if (docSnap.exists()) {
    D = docSnap.data();
    // Sécurisation de la structure des données récupérées
    D.pts = D.pts || {}; D.scores = D.scores || {}; D.bracket = D.bracket || {};
    D.pronos = D.pronos || {}; D.actual = D.actual || {};
    if(!D.teamStats || D.teamStats.length === 0) {
      D.teamStats = TEAMS_DATA.map(t=>({flag:t.flag, name:t.name, mvp:'', goals:0, played:0, cs:0}));
    }
    D.rdvList = D.rdvList || [{id:'rdv_0',date:'',mois:'',match:'',heure:'',where:'',presents:{}}];
  } else {
    // Premier lancement : initialisation avec données par défaut
    D.teamStats = TEAMS_DATA.map(t=>({flag:t.flag, name:t.name, mvp:'', goals:0, played:0, cs:0}));
    syncToFirebase();
  }
  // Forcer la mise à jour visuelle sur l'onglet courant dès qu'une modification cloud arrive
  window.showTab(currentTabId);
}, (error) => {
  console.error("Erreur d'écoute Firebase (Vérifier les règles de sécurité Firestore) :", error);
});

// Premier affichage au démarrage
window.showTab(currentTabId);
</script>
</body>
</html>
