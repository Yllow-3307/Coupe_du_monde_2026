function save(){
  try{localStorage.setItem('wc26v3',JSON.stringify(D))}catch(e){}
  setDoc(docRef, D).catch(e => console.error("Erreur synchro Firebase:", e));
}

window.showTab = function(tabId) {
  currentTabId = tabId;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  
  const activeBtn = Array.from(document.querySelectorAll('.tab')).find(t => t.getAttribute('onclick').includes(tabId));
  if(activeBtn) activeBtn.classList.add('active');
  
  const secEl = document.getElementById(tabId);
  if(secEl) secEl.classList.add('active');
  
  if(tabId === 'groupes') renderGroups();
  else if(tabId === 'matchs') renderMatchs();
  else if(tabId === 'bracket') renderBracket();
  else if(tabId === 'pronos') renderPronos();
  else if(tabId === 'stats') renderStats();
  else if(tabId === 'equipes') renderTeams();
  else if(tabId === 'rdv') renderRdv();
}

function getPts(g,i){return D.pts[g+i]!==undefined?D.pts[g+i]:0}

function renderGroups(){

  el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
    <div style="display:flex;gap:12px;flex-wrap:wrap">

      <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary)"><span style="width:8px;height:8px;background:#EF9F27;border-radius:2px;display:inline-block"></span>Potentiel meilleur 3e</span>

  </div>
  <div class="grp-grid">${Object.entries(GROUPS).map(([g,d])=>{
    const sorted=[...d.teams].map((t,i)=>({t,i,p:getPts(g,i)})).sort((a,b)=>b.p-a.p);
    return`<div class="grp-card"><div class="grp-title">Groupe ${g}</div>${sorted.map((item,rank)=>{
      const cls=rank<2?'team-row q1':rank===2?'team-row q3':'team-row qn';

    }).join('')}</div>`;}).join('')}</div>`;
    
  Object.entries(GROUPS).forEach(([g,d])=>{
    d.teams.forEach((_,i)=>{
      const cell = document.getElementById(`pts-c-${g}-${i}`);
      if(cell) cell.onclick = function() { editPts(this, g, i); };
    });

    n.style.cssText='font-size:12px;color:var(--color-text-success);margin-left:8px';

function editPts(el,g,i){
  const cur=getPts(g,i);const inp=document.createElement('input');
  inp.type='number';inp.value=cur;inp.min=0;inp.max=9;
  inp.style.cssText='width:28px;height:22px;text-align:center;font-size:12px;border:0.5px solid var(--color-border-info);border-radius:4px;background:var(--color-background-info);color:var(--color-text-info)';
  el.replaceWith(inp);inp.focus();inp.select();
  const commit=()=>{D.pts[g+i]=Math.max(0,Math.min(9,parseInt(inp.value)||0));save();renderGroups()};
  inp.addEventListener('blur',commit);inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit()});
}

function renderBracket(){
  const el = document.getElementById('bracket');

  // Fonction unique pour générer une colonne (gauche ou droite)
  function bCol(slots, ri, offset){
    const spacer = Math.pow(2, ri) * 6;
    let html = '';
    for(let i = 0; i < slots; i++){
      const mi = offset + i; // L'offset permet de basculer sur les index de droite
      const k1 = `r${ri}m${mi}t1`, k2 = `r${ri}m${mi}t2`;
      const t1 = D.bracket[k1] || (ri === 0 ? `Éq.${mi*2+1}` : '?');
      const t2 = D.bracket[k2] || (ri === 0 ? `Éq.${mi*2+2}` : '?');
      const nk = `r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
      const w = D.bracket[nk];
      html += `<div class="b-match">
        <div class="b-team${w===t1?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',1)">${t1}</div>
        <div class="b-team${w===t2?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',2)">${t2}</div>
      </div>`;
      if(i < slots - 1) html += `<div style="height:${spacer}px"></div>`;
    }
    return html;
  }

  const colLabels = ["32es", "16es", "Quarts", "Demies"];

  // 1. Arbre de GAUCHE (Matchs 0 à 7 au rang 0)
  let leftCols = '';
  for(let r = 0; r < 4; r++){
    const slots = 8 / Math.pow(2, r);
    leftCols += `<div class="b-col" style="min-width:120px">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column">${bCol(slots, r, 0)}</div>
    </div>`;
  }

  // 2. Arbre de DROITE (Matchs 8 à 15 au rang 0, Matchs 4 à 7 au rang 1, etc.)
  let rightCols = '';
  for(let r = 3; r >= 0; r--){
    const slots = 8 / Math.pow(2, r);
    const offset = 8 / Math.pow(2, r); // Décale les index pour la partie droite
    rightCols += `<div class="b-col" style="min-width:120px">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column">${bCol(slots, r, offset)}</div>
    </div>`;
  }

  // 3. FINALE (Au centre, Match r4m0)
  const fk1 = 'r4m0t1', fk2 = 'r4m0t2';
  const ft1 = D.bracket[fk1] || '?'; 
  const ft2 = D.bracket[fk2] || '?';
  const fw = D.bracket['r5m0t1'];
  const champion = D.bracket['r5m0t1'] || null;

  const finaleHtml = `<div class="b-col" style="min-width:120px;align-items:center">
    <div class="b-col-title" style="text-align:center">Finale</div>
    <div class="b-match">
      <div class="b-team${fw===ft1?' winner':''}" onclick="pickW(4,0,'${ft1.replace(/'/g,"\\'")}','${ft2.replace(/'/g,"\\'")}',1)">${ft1}</div>
      <div class="b-team${fw===ft2?' winner':''}" onclick="pickW(4,0,'${ft1.replace(/'/g,"\\'")}','${ft2.replace(/'/g,"\\'")}',2)">${ft2}</div>
    </div>
  </div>`;

  el.innerHTML = `<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Renseigne les équipes qualifiées après les groupes, puis clique sur le vainqueur de chaque match pour faire avancer le bracket.</p>
  <div class="bracket-wrap">
    <div class="bracket-tree" style="align-items:center">
      ${leftCols}
      <div style="width:8px"></div>
      ${finaleHtml}
      <div style="width:8px"></div>
      ${rightCols}
    </div>
    ${champion ? `<div style="text-align:center;margin-top:16px"><div style="font-size:24px;margin-bottom:6px">🏆</div><div style="display:inline-block;padding:8px 20px;background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-lg);font-weight:500;color:var(--color-text-primary);font-size:14px">${champion}</div></div>` : ''}
  </div>`;
}

  // Écouteurs de clics et changements à gauche
  for(let r=0;r<4;r++){
    const slots = 8/Math.pow(2,r);
    for(let i=0;i<slots;i++){
      const mi = i;
      const k1=`r${r}m${mi}t1`, k2=`r${r}m${mi}t2`;
      const t1=D.bracket[k1]||(r===0?`Éq.${mi*2+1}`:'?');
      const t2=D.bracket[k2]||(r===0?`Éq.${mi*2+2}`:'?');
      if(r===0){
        document.getElementById(`inp-bL-${mi}-1`).onchange = function() { D.bracket[k1]=this.value; save(); };
        document.getElementById(`inp-bL-${mi}-2`).onchange = function() { D.bracket[k2]=this.value; save(); };
        document.getElementById(`btn-bL-${mi}-1`).onclick = function() { pickW(0, mi, D.bracket[k1]||`Éq.${mi*2+1}`, D.bracket[k2]||`Éq.${mi*2+2}`, 1); };
        document.getElementById(`btn-bL-${mi}-2`).onclick = function() { pickW(0, mi, D.bracket[k1]||`Éq.${mi*2+1}`, D.bracket[k2]||`Éq.${mi*2+2}`, 2); };
      } else {
        document.getElementById(`b-click-${r}-${mi}-1`).onclick = function() { pickW(r, mi, t1, t2, 1); };
        document.getElementById(`b-click-${r}-${mi}-2`).onclick = function() { pickW(r, mi, t1, t2, 2); };
      }
    }
  }

  // Écouteurs de clics et changements à droite
  for(let r=0;r<4;r++){
    const slots = 8/Math.pow(2,3-r);
    for(let i=0;i<slots;i++){
      const mi = (r === 0) ? (8 + i) : (Math.pow(2, 3-r)*2 + i);
      const k1=`r${r}m${mi}t1`, k2=`r${r}m${mi}t2`;
      const t1=D.bracket[k1]||(r===0?`Éq.${mi*2+1}`:'?');
      const t2=D.bracket[k2]||(r===0?`Éq.${mi*2+2}`:'?');
      if(r===0){
        document.getElementById(`inp-bR-${mi}-1`).onchange = function() { D.bracket[k1]=this.value; save(); };
        document.getElementById(`inp-bR-${mi}-2`).onchange = function() { D.bracket[k2]=this.value; save(); };
        document.getElementById(`btn-bR-${mi}-1`).onclick = function() { pickW(0, mi, D.bracket[k1]||`Éq.${mi*2+1}`, D.bracket[k2]||`Éq.${mi*2+2}`, 1); };
        document.getElementById(`btn-bR-${mi}-2`).onclick = function() { pickW(0, mi, D.bracket[k1]||`Éq.${mi*2+1}`, D.bracket[k2]||`Éq.${mi*2+2}`, 2); };
      } else {
        const el1 = document.getElementById(`b-click-${r}-${mi}-1`);
        const el2 = document.getElementById(`b-click-${r}-${mi}-2`);
        if(el1) el1.onclick = function() { pickW(r, mi, t1, t2, 1); };
        if(el2) el2.onclick = function() { pickW(r, mi, t1, t2, 2); };
      }
    }
  }

  document.getElementById('b-champ-box').onclick = function() {
    const finalw = D.bracket['r4m0t1'] || '?';
    if(finalw !== '?') {
      D.bracket['r5m0t1'] = D.bracket['r5m0t1'] === finalw ? '?' : finalw;
      save(); renderBracket();
    }
  };
}

window.pickW = function(ri, mi, t1, t2, tn) {
  const w = tn === 1 ? t1 : t2;
  const nk = `r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
  if (D.bracket[nk] === w) { D.bracket[nk] = '?'; } else { D.bracket[nk] = w; }
  save(); renderBracket();
}

      return`<div class="lb-row${i===0?' lb-winner':''}">
        <span style="font-size:15px;font-weight:500;min-width:24px;color:var(--color-text-secondary)">${medal||'#'+(i+1)}</span>
        <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;background:${AV_BG[pi]};color:${AV_TX[pi]}">${p.name.substring(0,2)}</div>
        <span style="flex:1;font-size:14px;font-weight:500;color:var(--color-text-primary)">${p.name}</span>
        <span style="font-size:18px;font-weight:500;color:var(--color-text-primary)">${p.pts}</span>
      </div>`;}).join('')}</div>
  </div>
  <div class="section-title" style="margin-top:1.5rem">Pronos par match (Gérés dynamiquement)</div>
  ${pronoMatchs.map(m=>{
    const s1 = D.scores[m.id+'a'] || '';
    const s2 = D.scores[m.id+'b'] || '';
    const topButeur = D.actual[m.id]?.top || '';
    return`<div class="prog-match">
      <div class="prog-match-hdr"><span style="font-weight:500;color:var(--color-text-primary)">${m.t1} vs ${m.t2}</span><span>${m.day} · Gr. ${m.g}</span></div>
      <div style="padding:8px 12px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:11px;color:var(--color-text-secondary)">Score Réel : <b>${s1 !== '' ? s1 + ' - ' + s2 : 'Pas encore joué'}</b></div>
        <input class="inp-sm" placeholder="Top buteur du match..." value="${topButeur}" id="act-top-${m.id}" style="width:100%;margin-top:5px;height:24px;font-size:11px">
      </div>
      <div>${POTES.map((pote)=>{
        const bet=D.pronos[m.id+pote]||{s1:'',s2:'',top:''};
        const pts=calcPts(m.id,pote);
        return`<div class="prog-bet-row">
          <span style="min-width:65px;color:var(--color-text-secondary)">${pote}</span>
          <input class="score-in" type="number" placeholder="?" value="${bet.s1}" id="bet-s1-${m.id}-${pote}" style="width:28px;height:24px;font-size:12px">
          <span style="color:var(--color-text-tertiary)">–</span>
          <input class="score-in" type="number" placeholder="?" value="${bet.s2}" id="bet-s2-${m.id}-${pote}" style="width:28px;height:24px;font-size:12px">
          <input class="inp-sm" placeholder="buteur..." value="${bet.top||''}" id="bet-top-${m.id}-${pote}" style="width:90px;height:24px;font-size:12px">
          ${pts>0?`<span class="pts-chip pts-${Math.min(pts,3)}">+${pts}</span>`:`<span class="pts-chip pts-0">—</span>`}
        </div>`;}).join('')}</div>
    </div>`;}).join('')}`;

  pronoMatchs.forEach(m => {
    document.getElementById(`act-top-${m.id}`).oninput = function() { if(!D.actual[m.id])D.actual[m.id]={}; D.actual[m.id].top=this.value; save(); };
    POTES.forEach(pote => {
      document.getElementById(`bet-s1-${m.id}-${pote}`).oninput = function() { setBet(m.id, pote, 's1', this.value); };
      document.getElementById(`bet-s2-${m.id}-${pote}`).oninput = function() { setBet(m.id, pote, 's2', this.value); };
      document.getElementById(`bet-top-${m.id}-${pote}`).oninput = function() { setBet(m.id, pote, 'top', this.value); };
    });
  });
}

function setBet(mid,pote,key,val){
  if(!D.pronos[mid+pote]) D.pronos[mid+pote]={s1:'',s2:'',top:''};
  D.pronos[mid+pote][key]=val; save();
}

function calcPts(mid,pote){
  const bet=D.pronos[mid+pote];
  const as1=D.scores[mid+'a']; const as2=D.scores[mid+'b'];
  if(!bet||as1===undefined||as2===undefined||as1===''||as2==='')return 0;
  const bs1=parseInt(bet.s1),bs2=parseInt(bet.s2),nas1=parseInt(as1),nas2=parseInt(as2);
  if(isNaN(bs1)||isNaN(bs2)||isNaN(nas1)||isNaN(nas2))return 0;
  let pts=0; const res=(a,b)=>a>b?1:a<b?-1:0;
  if(res(bs1,bs2)===res(nas1,nas2))pts=1;
  if(bs1===nas1&&bs2===nas2)pts=2;
  if(pts^^0 && bet.top && D.actual[mid]?.top && bet.top.trim().toLowerCase()===D.actual[mid].top.trim().toLowerCase())pts=3;
  return pts;
}

function calcLB(){
  return POTES.map(p=>({name:p,pts:D.matchsList.filter(m=>m.isProno).reduce((s,m)=>s+calcPts(m.id,p),0)})).sort((a,b)=>b.pts-a.pts);
}

function renderStats(){
  const el=document.getElementById('stats');
  const tM=D.matchsList.length;
  let tG=0;
  Object.keys(D.scores).forEach(k=>{ if(D.scores[k]!=='') tG+=parseInt(D.scores[k])||0; });
  
  el.innerHTML=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-lbl">Matchs Ajoutés</div><div class="stat-val">${tM}</div></div>
    <div class="stat-card"><div class="stat-lbl">Buts Inscrits</div><div class="stat-val">${tG}</div></div>
    <div class="stat-card"><div class="stat-lbl">Moyenne Buts / Match</div><div class="stat-val">${tM>0?(tG/tM).toFixed(2):'0.00'}</div></div>
  </div>
  <div class="card" style="padding:12px 14px;overflow-x:auto">
    <div style="display:grid;grid-template-columns:1.6fr 0.7fr 0.7fr 0.7fr 0.7fr 1.4fr;gap:4px;font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;border-bottom:0.5px solid var(--color-border-secondary);padding-bottom:6px;margin-bottom:6px;min-width:400px">
      <span>Équipe</span><span style="text-align:center">J</span><span style="text-align:center">Buts</span><span style="text-align:center">Moy</span><span style="text-align:center">CS</span><span>Meilleur Joueur (MVP)</span>
    </div>
    ${D.teamStats.map((t,i)=>`<div style="display:grid;grid-template-columns:1.6fr 0.7fr 0.7fr 0.7fr 0.7fr 1.4fr;gap:4px;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);min-width:400px">
      <span style="font-size:12px;display:flex;align-items:center;gap:4px"><span style="font-size:14px">${t.flag}</span>${t.name}</span>
      <span style="text-align:center;font-size:12px">${t.played||0}</span>
      <span style="text-align:center;font-size:12px;font-weight:500">${t.goals||0}</span>
      <span style="text-align:center;font-size:12px;color:var(--color-text-secondary)">${(t.played||0)>0?(t.goals/t.played).toFixed(1):'—'}</span>
      <span style="text-align:center;font-size:12px">${t.cs||0}</span>
      <span><input class="inp-sm" value="${t.mvp||''}" id="st-mvp-${i}" style="height:24px;font-size:12px;width:100%"></span>
    </div>`).join('')}
  </div>`;

  D.teamStats.map((_,i)=>{
    document.getElementById(`st-mvp-${i}`).oninput = function() { D.teamStats[i].mvp = this.value; save(); };
  });
}

function renderTeams(){
  const el=document.getElementById('equipes');
  el.innerHTML=`<div class="teams-grid">${TEAMS_DATA.map((t,idx)=>`<div class="team-card">
    <div class="team-card-hdr" id="t-hdr-${idx}">
      <span style="font-size:18px">${t.flag}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${t.name}</div>
        <div style="font-size:11px;color:var(--color-text-secondary)">Groupe ${t.group} · Sél: ${t.coach}</div>
      </div>
      <span style="font-size:12px;color:var(--color-text-tertiary)">▼</span>
    </div>
    <div class="team-card-body" id="t-body-${idx}">
      ${t.players.map(p=>`<div class="player-row">
        <span class="player-num">#${p.n}</span>
        <span class="player-pos">${p.pos}</span>
        <span style="color:var(--color-text-primary);font-size:12px">${p.name}</span>
      </div>`).join('')}
    </div>
  </div>`).join('')}</div>`;

  TEAMS_DATA.forEach((_,idx)=>{
    document.getElementById(`t-hdr-${idx}`).onclick = function() {
      const b = document.getElementById(`t-body-${idx}`);
      if(b) b.classList.toggle('open');
    };
  });
}

function renderRdv(){
  const el=document.getElementById('rdv');
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <p style="font-size:12px;color:var(--color-text-secondary)">Planifie vos soirées foot. Cochez votre avatar pour confirmer votre présence.</p>
    <button class="btn btn-primary" id="btn-add-rdv">+ Organiser un RDV</button>
  </div>`+
  D.rdvList.map((r,ri)=>{
    let count=0; POTES.forEach(p=>{ if(r.presents&&r.presents[p]===1)count++; });
    return`<div class="rdv-card" style="display:flex;gap:12px">
      <div class="rdv-date-box" style="align-self:flex-start">
        <input type="text" placeholder="18" value="${r.date}" id="rdv-dt-${ri}" style="width:100%;text-align:center;font-size:18px;font-weight:500;background:none;border:none;color:var(--color-text-info);outline:none"><br>
        <input type="text" placeholder="JUIN" value="${r.mois}" id="rdv-ms-${ri}" style="width:100%;text-align:center;font-size:10px;background:none;border:none;color:var(--color-text-info);outline:none;text-transform:uppercase">
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;align-items:center;gap:6px">
          <input type="text" placeholder="Affiche du match..." value="${r.match}" id="rdv-mt-${ri}" style="flex:1;font-size:14px;font-weight:500;background:none;border:none;color:var(--color-text-primary);outline:none">
          <button id="rdv-del-${ri}" style="background:none;border:none;color:var(--color-text-danger);cursor:pointer">🗑️</button>
        </div>
        <div style="display:flex;gap:12px;font-size:11px;color:var(--color-text-secondary)">
          <span>🕒 <input type="text" placeholder="21:00" value="${r.heure}" id="rdv-hr-${ri}" style="width:40px;background:none;border:none;color:inherit;outline:none"></span>
          <span>📍 <input type="text" placeholder="Chez Simon" value="${r.where}" id="rdv-wh-${ri}" style="width:100px;background:none;border:none;color:inherit;outline:none"></span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">${POTES.map(p=>{
          const state=(r.presents&&r.presents[p]===1); const pi=POTES.indexOf(p);
          return`<div id="rdv-pote-${ri}-${p}" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;cursor:pointer;background:${AV_BG[pi]};color:${AV_TX[pi]};opacity:${state?'1':'0.35'};border:${state?'2px solid #1D9E75':'1.5px solid transparent'}">${p.substring(0,2)}</div>`;
        }).join('')}</div>
        <span style="font-size:12px;color:var(--color-text-secondary)">${count>0?count+' présent'+(count>1?'s':''):'Personne encore'}</span>
      </div>
    </div>`;}).join('');

  document.getElementById('btn-add-rdv').onclick = addRdv;
  D.rdvList.forEach((r, ri) => {
    document.getElementById(`rdv-dt-${ri}`).onchange = function() { D.rdvList[ri].date = this.value; save(); };
    document.getElementById(`rdv-ms-${ri}`).onchange = function() { D.rdvList[ri].mois = this.value; save(); };
    document.getElementById(`rdv-mt-${ri}`).onchange = function() { D.rdvList[ri].match = this.value; save(); };
    document.getElementById(`rdv-hr-${ri}`).onchange = function() { D.rdvList[ri].heure = this.value; save(); };
    document.getElementById(`rdv-wh-${ri}`).onchange = function() { D.rdvList[ri].where = this.value; save(); };
    document.getElementById(`rdv-del-${ri}`).onclick = function() { removeRdv(ri); };
    POTES.forEach(p => {
      document.getElementById(`rdv-pote-${ri}-${p}`).onclick = function() { toggleRdv(ri, p); };
    });
  });
}

function toggleRdv(ri,p){if(!D.rdvList[ri].presents)D.rdvList[ri].presents={};D.rdvList[ri].presents[p]=(D.rdvList[ri].presents[p]||0)===1?0:1;save();renderRdv()}
function addRdv(){D.rdvList.push({id:'rdv_'+Date.now(),date:'',mois:'',match:'',heure:'',where:'',presents:{}});save();renderRdv()}
function removeRdv(ri){if(D.rdvList.length<=1){D.rdvList[0]={id:'rdv_0',date:'',mois:'',match:'',heure:'',where:'',presents:{}}}else{D.rdvList.splice(ri,1)}save();renderRdv()}

window.updateStatsAutomatique = function() {
  D.teamStats.forEach(t => { t.goals = 0; t.played = 0; t.cs = 0; });
  D.matchsList.forEach(m => {
    const s1 = D.scores[m.id+'a']; const s2 = D.scores[m.id+'b'];
    if (s1 !== undefined && s2 !== undefined && s1 !== '' && s2 !== '') {
      const g1 = parseInt(s1); const g2 = parseInt(s2);
      const t1Data = D.teamStats.find(t => m.t1.toLowerCase().includes(t.name.toLowerCase()));
      const t2Data = D.teamStats.find(t => m.t2.toLowerCase().includes(t.name.toLowerCase()));
      if (t1Data) { t1Data.played += 1; t1Data.goals += g1; if (g2 === 0) t1Data.cs += 1; }
      if (t2Data) { t2Data.played += 1; t2Data.goals += g2; if (g1 === 0) t2Data.cs += 1; }
    }
  });
  save();
}

showTab('groupes');
</script>
