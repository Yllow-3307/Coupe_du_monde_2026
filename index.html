<h2 class="sr-only">Tracker Coupe du Monde 2026 — groupes, bracket, pronos, stats équipes, fiches joueurs et RDV soirées</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.hdr{padding:1.5rem 0 1rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.hdr p{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);overflow-x:auto}
.tab{padding:8px 12px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap;transition:all 0.15s}
.tab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
.tab:hover:not(.active){color:var(--color-text-primary)}
.sec{display:none}.sec.active{display:block}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:none;color:var(--color-text-secondary)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.section-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px}
.grp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:10px}
.grp-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 12px}
.grp-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px}
.team-row{display:flex;align-items:center;gap:6px;padding:4px 0 4px 5px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
.team-row:last-child{border-bottom:none}
.q1{border-left:3px solid #1D9E75}.q3{border-left:3px solid #EF9F27}.qn{border-left:3px solid transparent}
.pts-cell{min-width:22px;text-align:right;color:var(--color-text-secondary);font-size:12px;cursor:pointer;padding:1px 3px;border-radius:3px}
.pts-cell:hover{background:var(--color-background-secondary)}
.score-in{width:28px;height:26px;text-align:center;font-size:13px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary)}
.inp-sm{height:28px;font-size:13px;padding:0 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary)}
.leaderboard{display:flex;flex-direction:column;gap:6px}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg)}
.lb-winner{background:var(--color-background-warning);border-color:var(--color-border-warning)}
.prog-match{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:10px}
.prog-match-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;color:var(--color-text-secondary)}
.prog-bet-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
.prog-bet-row:last-child{border-bottom:none}
.pts-chip{font-size:11px;padding:1px 6px;border-radius:8px;font-weight:500;margin-left:6px}
.pts-0{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.pts-1{background:#FAEEDA;color:#633806}
.pts-2{background:#EAF3DE;color:#27500A}
.pts-3{background:#E1F5EE;color:#085041}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-sub{font-size:11px;color:var(--color-text-secondary)}

/* BRACKET */
.bracket-wrap{overflow-x:auto;padding-bottom:12px}
.bracket-tree{display:flex;align-items:center;gap:0;min-width:1100px}
.b-col{display:flex;flex-direction:column;justify-content:space-around;padding:0 4px}
.b-col-title{font-size:10px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;text-align:center;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:8px;white-space:nowrap}
.b-match{display:flex;flex-direction:column;gap:1px;margin:4px 0}
.b-team{font-size:11px;padding:5px 7px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);cursor:pointer;max-width:115px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--color-text-secondary);transition:background 0.1s}
.b-team:first-child{border-radius:6px 6px 0 0}
.b-team:last-child{border-radius:0 0 6px 6px}
.b-team:hover{background:var(--color-background-secondary)}
.b-team.winner{color:var(--color-text-success);font-weight:500;background:var(--color-background-success)}
.b-connector{width:12px;align-self:stretch}
.b-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:130px;padding:0 8px}
.b-trophy{font-size:32px;text-align:center;margin-bottom:6px}
.b-champion{font-size:13px;font-weight:500;color:var(--color-text-primary);text-align:center;padding:8px 12px;background:var(--color-background-warning);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-warning)}

/* EQUIPES */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.team-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.team-card-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer}
.team-card-hdr:hover{background:var(--color-background-secondary)}
.team-card-body{padding:10px 12px;display:none}
.team-card-body.open{display:block}
.player-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.player-row:last-child{border-bottom:none}
.player-num{min-width:20px;color:var(--color-text-tertiary);font-size:11px}
.player-pos{font-size:10px;padding:1px 5px;border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-secondary)}

/* RDV */
.rdv-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px}
.rdv-date-box{background:var(--color-background-info);border-radius:var(--border-radius-md);padding:6px 10px;text-align:center;min-width:52px}
.rdv-date-d{font-size:18px;font-weight:500;color:var(--color-text-info)}
.rdv-date-m{font-size:10px;color:var(--color-text-info)}
</style>

function save(){try{localStorage.setItem('wc26v3',JSON.stringify(D))}catch(e){}}

function getPts(g,i){return D.pts[g+i]!==undefined?D.pts[g+i]:0}

function renderGroups(){
  const el=document.getElementById('groupes');

    </div>
    <button class="btn" onclick="saveG()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Sauvegarder</button>
  </div>
  <div class="grp-grid">${Object.entries(GROUPS).map(([g,d])=>{
    const sorted=[...d.teams].map((t,i)=>({t,i,p:getPts(g,i)})).sort((a,b)=>b.p-a.p);
    return`<div class="grp-card"><div class="grp-title">Groupe ${g}</div>${sorted.map((item,rank)=>{
      const cls=rank<2?'team-row q1':rank===2?'team-row q3':'team-row qn';
      return`<div class="${cls}"><span style="font-size:15px;width:22px">${item.t[0]}</span><span style="flex:1;color:var(--color-text-primary)">${item.t[1]}</span><span class="pts-cell" onclick="editPts(this,'${g}',${item.i})">${item.p}</span></div>`;
    }).join('')}</div>`;}).join('')}</div>`;
}
function saveG(){save();const b=document.querySelector('#groupes .btn');const n=document.createElement('span');n.style.cssText='font-size:12px;color:var(--color-text-success);margin-left:8px';n.textContent='✓ Sauvegardé';b.after(n);setTimeout(()=>n.remove(),2000)}
function editPts(el,g,i){
  const cur=getPts(g,i);const inp=document.createElement('input');
  inp.type='number';inp.value=cur;inp.min=0;inp.max=9;
  inp.style.cssText='width:28px;height:22px;text-align:center;font-size:12px;border:0.5px solid var(--color-border-info);border-radius:4px;background:var(--color-background-info);color:var(--color-text-info)';
  el.replaceWith(inp);inp.focus();inp.select();
  const commit=()=>{D.pts[g+i]=Math.max(0,Math.min(9,parseInt(inp.value)||0));renderGroups()};
  inp.addEventListener('blur',commit);inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit()});
}

      <span style="color:var(--color-text-tertiary);font-size:12px">–</span>
      <input class="score-in" type="number" min="0" max="20" placeholder="—" value="${D.scores[idx+'b']!==undefined?D.scores[idx+'b']:''}" oninput="D.scores[${idx}+'b']=this.value;save()">
      <span style="flex:1;font-size:13px;font-weight:500;color:var(--color-text-primary);text-align:right">${m.t2}</span>

}

function renderBracket(){
  const el = document.getElementById('bracket');
  
  // Fonction générique pour générer une colonne (gauche ou droite)
  // slots = nombre de matchs dans la colonne, ri = index du tour, offset = point de départ des matchs
  function bCol(slots, ri, offset){
    const spacer = Math.pow(2, ri) * 12; // Espace dynamique entre les matchs pour l'arbre
    let html = '';
    for(let i = 0; i < slots; i++){
      const mi = offset + i; // Index unique du match
      const k1 = `r${ri}m${mi}t1`, k2 = `r${ri}m${mi}t2`;
      const t1 = D.bracket[k1] || (ri === 0 ? `Éq.${mi*2+1}` : '?');
      const t2 = D.bracket[k2] || (ri === 0 ? `Éq.${mi*2+2}` : '?');
      
      // Calcul du match suivant dans le tour d'après
      const nk = `r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
      const w = D.bracket[nk];
      
      html += `<div class="b-match">
        <div class="b-team${w===t1?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',1)">${t1}</div>
        <div class="b-team${w===t2?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',2)">${t2}</div>
      </div>`;
      if(i < slots - 1) html += `<div style="height:${spacer}px"></div>`;
    }
    return html;
  }

  const colLabels = ["32es", "16es", "Huitièmes", "Quarts", "Demies"];
  
  // 1. Construction de la partie GAUCHE (Matchs 0 à 7 pour le Round 0)
  let leftCols = '';
  for(let r = 0; r < 5; r++){
    const slots = 8 / Math.pow(2, r); // 8 -> 4 -> 2 -> 1 -> 0.5 (géré par la boucle)
    if (slots < 1) break;
    leftCols += `<div class="b-col" style="min-width:120px">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column;justify-content:center;height:100%">${bCol(slots, r, 0)}</div>
    </div>`;
  }

  // 2. Construction de la partie DROITE (Matchs 8 à 15 pour le Round 0)
  // On inverse la boucle pour l'affichage visuel de droite à gauche
  let rightCols = '';
  for(let r = 4; r >= 0; r--){
    const slots = 8 / Math.pow(2, r);
    if (slots < 1) continue;
    // L'offset magique : le premier match de droite au Round R commence après les matchs de gauche
    const offset = 8 / Math.pow(2, r); 
    rightCols += `<div class="b-col" style="min-width:120px">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column;justify-content:center;height:100%">${bCol(slots, r, offset)}</div>
    </div>`;
  }

  // 3. Finale centrale (Vainqueur demi-gauche match 0 vs Vainqueur demi-droite match 1)
  const ft1 = D.bracket['r4m0t1'] || '?'; 
  const ft2 = D.bracket['r4m0t2'] || '?';
  const fw = D.bracket['r5m0t1']; // Le Champion
  
  const finaleHtml = `<div class="b-col" style="min-width:130px;align-items:center;justify-content:center">
    <div class="b-col-title" style="text-align:center">Finale</div>
    <div class="b-match">
      <div class="b-team${fw===ft1?' winner':''}" onclick="pickW(4,0,'${ft1.replace(/'/g,"\\'")}','${ft2.replace(/'/g,"\\'")}',1)">${ft1}</div>
      <div class="b-team${fw===ft2?' winner':''}" onclick="pickW(4,0,'${ft1.replace(/'/g,"\\'")}','${ft2.replace(/'/g,"\\'")}',2)">${ft2}</div>
    </div>
  </div>`;

  // Rendu global dans le HTML
  el.innerHTML = `<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Renseigne les équipes qualifiées après les groupes, puis clique sur le vainqueur de chaque match pour faire avancer le bracket.</p>
  <div class="bracket-wrap">
    <div class="bracket-tree" style="align-items:stretch;justify-content:center">
      ${leftCols}
      <div style="width:15px"></div>
      ${finaleHtml}
      <div style="width:15px"></div>
      ${rightCols}
    </div>
    ${fw ? `<div style="text-align:center;margin-top:20px"><div style="font-size:28px;margin-bottom:6px">🏆</div><div style="display:inline-block;padding:8px 20px;background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-lg);font-weight:500;color:var(--color-text-primary);font-size:14px">CHAMPION : ${fw}</div></div>` : ''}
  </div>`;
}

function pickW(ri,mi,t1,t2,tn){
  const w=tn===1?t1:t2;
  const nk=`r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
  D.bracket[nk]=w;save();renderBracket();
}

function renderPronos(){
  const el=document.getElementById('pronos');

  el.innerHTML=`<div style="margin-bottom:16px">

    <div class="leaderboard">${lb.map((p,i)=>{
      const pi=POTES.indexOf(p.name);const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      return`<div class="lb-row${i===0?' lb-winner':''}">
        <span style="font-size:15px;font-weight:500;min-width:24px;color:var(--color-text-secondary)">${medal||'#'+(i+1)}</span>
        <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;background:${AV_BG[pi]};color:${AV_TX[pi]}">${p.name.substring(0,2)}</div>
        <span style="flex:1;font-size:14px;font-weight:500;color:var(--color-text-primary)">${p.name}</span>
        <span style="font-size:18px;font-weight:500;color:var(--color-text-primary)">${p.pts}</span>
        <span style="font-size:11px;color:var(--color-text-secondary);margin-left:3px">pts</span>
      </div>`;}).join('')}
    </div>
  </div>
  <div class="section-title" style="margin-top:1.5rem">Pronos par match</div>
  <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px"><span class="pts-chip pts-1">1 pt</span> bon résultat &nbsp;<span class="pts-chip pts-2">2 pts</span> score exact &nbsp;<span class="pts-chip pts-3">3 pts</span> + buteur</div>
  ${PRONO_MATCHES.map(m=>{
    const actual=D.actual[m.id]||{s1:'',s2:'',top:''};
    return`<div class="prog-match">
      <div class="prog-match-hdr"><span style="font-weight:500;color:var(--color-text-primary)">${m.label}</span><span>${m.date} · ${m.group}</span></div>
      <div style="padding:8px 12px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">Score réel :</div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <input class="score-in" type="number" min="0" max="20" placeholder="—" value="${actual.s1}" oninput="setActual('${m.id}','s1',this.value)" style="width:32px;height:28px">
          <span style="color:var(--color-text-tertiary)">–</span>
          <input class="score-in" type="number" min="0" max="20" placeholder="—" value="${actual.s2}" oninput="setActual('${m.id}','s2',this.value)" style="width:32px;height:28px">
          <input class="inp-sm" placeholder="Top buteur..." value="${actual.top||''}" oninput="setActual('${m.id}','top',this.value)" style="width:130px">
        </div>
      </div>
      <div>${POTES.map((pote)=>{
        const bet=D.pronos[m.id+pote]||{s1:'',s2:'',top:''};
        const pts=calcPts(m.id,pote);
        return`<div class="prog-bet-row">
          <span style="min-width:65px;color:var(--color-text-secondary)">${pote}</span>
          <input class="score-in" type="number" min="0" max="20" placeholder="?" value="${bet.s1}" oninput="setBet('${m.id}','${pote}','s1',this.value)" style="width:28px;height:24px;font-size:12px">
          <span style="color:var(--color-text-tertiary);font-size:11px">–</span>
          <input class="score-in" type="number" min="0" max="20" placeholder="?" value="${bet.s2}" oninput="setBet('${m.id}','${pote}','s2',this.value)" style="width:28px;height:24px;font-size:12px">
          <input class="inp-sm" placeholder="buteur..." value="${bet.top||''}" oninput="setBet('${m.id}','${pote}','top',this.value)" style="width:90px;height:24px;font-size:12px">
          ${pts>0?`<span class="pts-chip pts-${Math.min(pts,3)}">+${pts}</span>`:`<span class="pts-chip pts-0">—</span>`}
        </div>`;}).join('')}</div>
    </div>`;}).join('')}`;
}
function setActual(mid,f,v){if(!D.actual[mid])D.actual[mid]={};D.actual[mid][f]=v;save();renderPronos()}
function setBet(mid,p,f,v){const k=mid+p;if(!D.pronos[k])D.pronos[k]={};D.pronos[k][f]=v;save();renderPronos()}
function calcPts(mid,pote){
  const bet=D.pronos[mid+pote];const actual=D.actual[mid];
  if(!bet||!actual||actual.s1===''||actual.s2==='')return 0;
  const bs1=parseInt(bet.s1),bs2=parseInt(bet.s2),as1=parseInt(actual.s1),as2=parseInt(actual.s2);
  if(isNaN(bs1)||isNaN(bs2)||isNaN(as1)||isNaN(as2))return 0;
  let pts=0;
  const res=(a,b)=>a>b?1:a<b?-1:0;
  if(res(bs1,bs2)===res(as1,as2))pts=1;
  if(bs1===as1&&bs2===as2)pts=2;
  if(pts>=1&&bet.top&&actual.top&&bet.top.trim().toLowerCase()===actual.top.trim().toLowerCase())pts=3;
  return pts;
}
function calcLB(){
  return POTES.map(p=>({name:p,pts:PRONO_MATCHES.reduce((s,m)=>s+calcPts(m.id,p),0)})).sort((a,b)=>b.pts-a.pts);
}

function showTab(id){
  const tabs=['groupes','matchs','bracket','pronos','stats','equipes','rdv'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===id));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('active',s.id===id));
  const renders={groupes:renderGroups,matchs:renderMatchs,bracket:renderBracket,pronos:renderPronos,stats:renderStats,equipes:renderEquipes,rdv:renderRdv};
  if(renders[id])renders[id]();
}
