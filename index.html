<h2 class="sr-only">Tracker Coupe du Monde 2026 — groupes, bracket, pronos, stats équipes, fiches joueurs et RDV soirées</h2>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--color-background-primary:#ffffff;--color-background-secondary:#fcfcfc;--color-background-tertiary:#f5f5f5;--color-background-warning:#fff9db;--color-border-primary:#000000;--color-border-secondary:#333333;--color-border-tertiary:#e5e5e5;--color-border-warning:#ffe066;--color-text-primary:#000000;--color-text-secondary:#666666;--font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;--border-radius-sm:2px;--border-radius-md:4px;--border-radius-lg:6px;--spacing-xs:4px;--spacing-sm:8px;--spacing-md:12px;--spacing-lg:16px;--spacing-xl:24px}
body{font-family:var(--font-family);background-color:var(--color-background-primary);color:var(--color-text-primary);padding:0 var(--spacing-lg);max-width:800px;margin:0 auto;-webkit-font-smoothing:antialiased}
.hdr{padding:1.5rem 0 1rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.hdr p{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 12px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
.tab i{font-size:15px}
.tab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
.tab:hover:not(.active){color:var(--color-text-primary)}
.sec{display:none}.sec.active{display:block}
.grid-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:var(--spacing-md);margin-bottom:var(--spacing-xl)}
.g-card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:var(--spacing-md)}
.g-title{font-size:13px;font-weight:500;margin-bottom:var(--spacing-sm);display:flex;justify-content:space-between;color:var(--color-text-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:4px}
.g-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:3px 0}
.g-team{display:flex;align-items:center;gap:6px;font-weight:400;color:var(--color-text-primary)}
.g-pts{font-weight:500;min-width:16px;text-align:right}
.g-row.qual {font-weight:500}
.m-list{display:flex;flex-direction:column;gap:var(--spacing-xs);margin-top:var(--spacing-sm)}
.m-row{display:flex;align-items:center;justify-content:between;gap:4px;background:var(--color-background-primary);padding:4px var(--spacing-sm);border-radius:var(--border-radius-sm);border:0.5px solid var(--color-border-tertiary);font-size:11px}
.m-teams{display:flex;flex-direction:column;gap:2px;flex:1}
.m-team-line{display:flex;justify-content:space-between;align-items:center}
.m-score{width:26px;height:18px;text-align:center;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-sm);font-size:11px;font-family:inherit;outline:none}
.m-score:focus{border-color:var(--color-border-primary)}
.bracket-wrap{overflow-x:auto;padding-bottom:var(--spacing-md);margin-bottom:var(--spacing-xl);-webkit-overflow-scrolling:touch}
.bracket-wrap::-webkit-scrollbar{height:4px}
.bracket-wrap::-webkit-scrollbar-thumb{background:var(--color-border-tertiary);border-radius:2px}
.bracket-tree{display:flex;gap:12px;align-items:stretch;min-width:900px}
.b-col{display:flex;flex-direction:column;width:140px;flex-shrink:0}
.b-col-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:var(--spacing-md);text-transform:uppercase;letter-spacing:0.5px;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:4px}
.b-match{display:flex;flex-direction:column;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.b-team{padding:6px var(--spacing-sm);font-size:11px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background 0.1s;display:flex;justify-content:space-between;align-items:center;background:var(--color-background-primary)}
.b-team:first-child{border-bottom:0.5px solid var(--color-border-tertiary)}
.b-team:hover{background:var(--color-background-tertiary)}
.b-team.winner{font-weight:500;background:var(--color-background-warning)}
.rdv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--spacing-md);margin-bottom:var(--spacing-xl)}
.rdv-card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:var(--spacing-md);display:flex;gap:var(--spacing-md)}
.rdv-date-box{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);min-width:52px;height:52px}
.rdv-day{font-size:16px;font-weight:600;line-height:1.1}
.rdv-month{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px}
.rdv-body{flex:1;display:flex;flex-direction:column;gap:2px}
.rdv-match{font-size:13px;font-weight:500}
.rdv-meta{font-size:11px;color:var(--color-text-secondary);display:flex;align-items:center;gap:8px}
.rdv-presents{display:flex;gap:4px;margin-top:6px;align-items:center;flex-wrap:wrap}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>

<div class="hdr">
  <div style="font-size:24px;line-height:1">🏆</div>
  <div>
    <h1>Coupe du Monde 2026</h1>
    <p>Groupes, Bracket & Organisation Soirées</p>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('groupes')"><i class="ti ti-table"></i> Poules</button>
  <button class="tab" onclick="switchTab('bracket')"><i class="ti ti-git-fork"></i> Phase Finale</button>
  <button class="tab" onclick="switchTab('rdv')"><i class="ti ti-calendar"></i> Soirées Matchs</button>
</div>

<div id="groupes" class="sec active">
  <div class="grid-g" id="groupes-grid"></div>
</div>

<div id="bracket" class="sec"></div>

<div id="rdv" class="sec">
  <div style="margin-bottom:var(--spacing-md);display:flex;justify-content:space-between;align-items:center">
    <p style="font-size:12px;color:var(--color-text-secondary)">Clique sur tes initiales pour indiquer ta présence au match.</p>
    <button onclick="addRdv()" style="padding:4px 10px;font-size:11px;background:var(--color-background-primary);border:0.5px solid var(--color-border-primary);border-radius:var(--border-radius-sm);cursor:pointer;font-weight:500">+++ Ajouter un RDV</button>
  </div>
  <div class="rdv-grid" id="rdv-grid"></div>
</div>

<script type="module">
// --- CONFIGURATION ET INTERACTION FIREBASE ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// REMPLACE CE BLOC PAR TES PROPRES CLÉS DEPUIS LA CONSOLE FIREBASE
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_AUTH_DOMAIN",
  projectId: "TON_PROJECT_ID",
  storageBucket: "TON_STORAGE_BUCKET",
  messagingSenderId: "TON_MESSAGING_SENDER_ID",
  appId: "TON_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const docRef = doc(db, "coupe_du_monde", "partagee");

window.PLAYERS = ["Alban", "Lino", "Louis", "Mathis", "Nael", "Sacha", "Tom", "Victor"];
const AV_BG = ["#E3F2FD","#F3E5F5","#E8F5E9","#FFF3E0","#FCE4EC","#EFEBE9","#E0F7FA","#F1F8E9"];
const AV_TX = ["#0D47A1","#4A148C","#1B5E20","#E65100","#880E4F","#4E342E","#006064","#33691E"];

const GROUPS_DEF = {
  A: ["🇺🇸 États-Unis", "🇲🇽 Mexique", "🇨🇦 Canada", "🇺🇾 Uruguay"],
  B: ["🇫🇷 France", "🇲🇦 Maroc", "🇲🇳 Mongolie", "🇳🇿 N-Zélande"],
  C: ["🇦🇷 Argentine", "🇪🇸 Espagne", "🇸🇦 Arabie S.", "🇮🇪 Irlande"],
  D: ["🏴󠁧󠁢󠁥󠁮󠁧󠁿 Angleterre", "🇧🇷 Brésil", "🇨🇲 Cameroun", "🇮🇸 Islande"],
  E: ["🇧🇪 Belgique", "🇵🇹 Portugal", "🇪🇬 Égypte", "🇯🇵 Japon"],
  F: ["🇩🇪 Allemagne", "🇳🇱 Pays-Bas", "🇨🇮 Côte d'Iv.", "🇦🇺 Australie"],
  G: ["🇮🇹 Italie", "🇭🇷 Croatie", "🇩🇿 Algérie", "🇰🇷 Corée du S."],
  H: ["🇨🇭 Suisse", "🇩🇰 Danemark", "🇸🇳 Sénégal", "🇨🇦 Tunisie"],
  I: ["🇨🇴 Colombie", "🇵🇪 Pérou", "🇦🇹 Autriche", "🇳🇬 Nigeria"],
  J: ["🇺🇦 Ukraine", "🇪🇨 Équateur", "🇲🇱 Mali", "🇶🇦 Qatar"],
  K: ["🇺🇿 Ouzbékistan", "🇵接 Panama", "🇻🇳 Vietnam", "🇿🇦 Afrique S."],
  L: ["🇮拉克 Irak", "🇴🇲 Oman", "🇯🇴 Jordanie", "🇺🇦 Écosse"]
};

window.D = {
  matchs: {},
  bracket: {},
  rdvList: [
    {id:'rdv_0', date:'11', mois:'Juin', match:'Match d\'ouverture 🇺🇸/🇨🇦/🇲🇽', heure:'21:00', where:'Chez Lino 🍕', presents:{}},
    {id:'rdv_1', date:'15', mois:'Juin', match:'Premier match des Bleus 🇫🇷', heure:'18:00', where:'Bar Central 🍻', presents:{}}
  ]
};

// Écoute des données en temps réel sur Firebase
onSnapshot(docRef, (docSnap) => {
  if (docSnap.exists()) {
    window.D = docSnap.data();
    if(!window.D.matchs) window.D.matchs = {};
    if(!window.D.bracket) window.D.bracket = {};
    if(!window.D.rdvList) window.D.rdvList = [];
    refreshAllViews();
  } else {
    console.log("Base vide, création des données initiales...");
    window.save();
  }
});

window.save = function() {
  setDoc(docRef, window.D)
    .then(() => console.log("Données mises à jour sur Firebase"))
    .catch((err) => console.error("Erreur de sauvegarde Firebase:", err));
}

function refreshAllViews() {
  renderGroupes();
  renderBracket();
  renderRdv();
}

window.switchTab = function(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  const activeBtn = document.querySelector(`[onclick="switchTab('${tabId}')"]`);
  if (activeBtn) activeBtn.classList.add('active');
  const activeSec = document.getElementById(tabId);
  if (activeSec) activeSec.classList.add('active');
}

window.renderGroupes = function() {
  const grid = document.getElementById('groupes-grid');
  if(!grid) return;
  let html = '';
  Object.keys(GROUPS_DEF).forEach(gName => {
    const teams = GROUPS_DEF[gName];
    const computed = teams.map(t => ({name: t, pts: 0, q: false}));
    
    // Simulation simple de points selon les inputs
    const s1 = parseInt(window.D.matchs[`g_${gName}_m1_s1`]) || 0;
    const s2 = parseInt(window.D.matchs[`g_${gName}_m1_s2`]) || 0;
    if(s1 > s2) computed[0].pts += 3; else if(s1 < s2) computed[1].pts += 3; else if(s1===s2 && window.D.matchs[`g_${gName}_m1_s1`] !== undefined) { computed[0].pts+=1; computed[1].pts+=1; }

    computed.sort((a,b) => b.pts - a.pts);
    computed[0].q = true; computed[1].q = true;

    html += `<div class="g-card">
      <div class="g-title"><span>Groupe ${gName}</span></div>
      <div>
        ${computed.map((t,idx) => `
          <div class="g-row ${t.q?'qual':''}">
            <span class="g-team"><span>${idx+1}.</span> ${t.name}</span>
            <span class="g-pts">${t.pts} pts</span>
          </div>
        `).join('')}
      </div>
      <div class="m-list">
        <div class="m-row">
          <div class="m-teams">
            <div class="m-team-line"><span>${teams[0]}</span><input type="number" class="m-score" value="${window.D.matchs[`g_${gName}_m1_s1`]||''}" onchange="upm('g_${gName}_m1_s1',this.value)"></div>
            <div class="m-team-line"><span>${teams[1]}</span><input type="number" class="m-score" value="${window.D.matchs[`g_${gName}_m1_s2`]||''}" onchange="upm('g_${gName}_m1_s2',this.value)"></div>
          </div>
        </div>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

window.upm = function(key, val) {
  if(val === "") delete window.D.matchs[key];
  else window.D.matchs[key] = parseInt(val);
  window.save();
}

window.renderBracket = function() {
  const el = document.getElementById('bracket');
  if(!el) return;
  
  function bCol(slots, ri, offset){
    const spacer = Math.pow(2, ri) * 12;
    let html = '';
    for(let i = 0; i < slots; i++){
      const mi = offset + i;
      const k1 = `r${ri}m${mi}t1`, k2 = `r${ri}m${mi}t2`;
      const t1 = window.D.bracket[k1] || (ri === 0 ? `Éq.${mi*2+1}` : '?');
      const t2 = window.D.bracket[k2] || (ri === 0 ? `Éq.${mi*2+2}` : '?');
      
      const nk = `r${nri}m${Math.floor(mi/2)}t${(mi%2)+1}`;
      const w = window.D.bracket[nk];
      
      html += `<div class="b-match">
        <div class="b-team${w===t1?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',1)">${t1}</div>
        <div class="b-team${w===t2?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',2)">${t2}</div>
      </div>`;
      if(i < slots - 1) html += `<div style="height:${spacer}px"></div>`;
    }
    return html;
  }

  const colLabels = ["32es", "16es", "Huitièmes", "Quarts", "Demies"];
  
  // 1. GAUCHE (Matchs 0 à 7)
  let leftCols = '';
  for(let r = 0; r < 5; r++){
    const slots = 8 / Math.pow(2, r);
    if (slots < 1) break;
    leftCols += `<div class="b-col">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column;justify-content:center;height:100%">${bCol(slots, r, 0)}</div>
    </div>`;
  }

  // 2. DROITE (Matchs 8 à 15)
  let rightCols = '';
  for(let r = 4; r >= 0; r--){
    const slots = 8 / Math.pow(2, r);
    if (slots < 1) continue;
    const offset = 8 / Math.pow(2, r); 
    rightCols += `<div class="b-col">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column;justify-content:center;height:100%">${bCol(slots, r, offset)}</div>
    </div>`;
  }

  // 3. FINALE
  const ft1 = window.D.bracket['r4m0t1'] || '?'; 
  const ft2 = window.D.bracket['r4m0t2'] || '?';
  const fw = window.D.bracket['r5m0t1'];
  
  const finaleHtml = `<div class="b-col" style="align-items:center;justify-content:center">
    <div class="b-col-title" style="text-align:center;width:100%">Finale</div>
    <div class="b-match" style="width:100%">
      <div class="b-team${fw===ft1?' winner':''}" onclick="pickW(4,0,'${ft1.replace(/'/g,"\\'")}','${ft2.replace(/'/g,"\\'")}',1)">${ft1}</div>
      <div class="b-team${fw===ft2?' winner':''}" onclick="pickW(4,0,'${ft1.replace(/'/g,"\\'")}','${ft2.replace(/'/g,"\\'")}',2)">${ft2}</div>
    </div>
  </div>`;

  el.innerHTML = `<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Sélectionne le vainqueur de chaque match pour faire avancer le bracket.</p>
  <div class="bracket-wrap">
    <div class="bracket-tree" style="align-items:stretch;justify-content:center">
      ${leftCols}
      <div style="width:15px"></div>
      ${finaleHtml}
      <div style="width:15px"></div>
      ${rightCols}
    </div>
    ${fw ? `<div style="text-align:center;margin-top:20px"><div style="font-size:28px;margin-bottom:6px">🏆</div><div style="display:inline-block;padding:8px 20px;background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-lg);font-weight:500;color:var(--color-text-primary);font-size:14px">CHAMPION : ${fw}</div></div>` : ''}
  </div>`;
}

window.pickW = function(ri, mi, t1, t2, side) {
  const w = (side === 1) ? t1 : t2;
  if(w === '?') return;
  const nri = ri + 1;
  const nmi = Math.floor(mi / 2);
  const nt_side = (mi % 2) + 1;
  const nk = `r${nri}m${nmi}t${nt_side}`;
  window.D.bracket[nk] = w;
  window.save();
}

window.renderRdv = function() {
  const grid = document.getElementById('rdv-grid');
  if(!grid) return;
  if(window.D.rdvList.length === 0){
    grid.innerHTML = `<p style="font-size:12px;color:var(--color-text-secondary);grid-column:1/-1;text-align:center;padding:2rem 0">Aucune soirée de prévue pour le moment.</p>`;
    return;
  }
  grid.innerHTML = window.D.rdvList.map((rdv, ri) => {
    let count = 0;
    return `<div class="rdv-card">
      <div class="rdv-date-box">
        <input type="text" value="${rdv.date}" onchange="upRdv(${ri},'date',this.value)" placeholder="11" style="width:100%;text-align:center;font-size:16px;font-weight:600;border:none;outline:none;font-family:inherit;line-height:1.1">
        <input type="text" value="${rdv.mois}" onchange="upRdv(${ri},'mois',this.value)" placeholder="JUIN" style="width:100%;text-align:center;font-size:9px;color:var(--color-text-secondary);border:none;outline:none;font-family:inherit;text-transform:uppercase">
      </div>
      <div class="rdv-body">
        <div style="display:flex;justify-content:space-between;align-items:start;gap:4px">
          <input type="text" class="rdv-match" value="${rdv.match}" onchange="upRdv(${ri},'match',this.value)" placeholder="Match ou soirée..." style="border:none;outline:none;font-family:inherit;font-weight:500;font-size:13px;flex:1;background:transparent">
          <button onclick="removeRdv(${ri})" style="background:none;border:none;color:#cc0000;cursor:pointer;font-size:14px;padding:0 2px" title="Supprimer">×</button>
        </div>
        <div class="rdv-meta">
          <span>⏰ <input type="text" value="${rdv.heure}" onchange="upRdv(${ri},'heure',this.value)" placeholder="21:00" style="border:none;outline:none;font-family:inherit;font-size:11px;color:var(--color-text-secondary);width:40px;background:transparent"></span>
          <span>📍 <input type="text" value="${rdv.where}" onchange="upRdv(${ri},'where',this.value)" placeholder="Chez..." style="border:none;outline:none;font-family:inherit;font-size:11px;color:var(--color-text-secondary);width:100px;background:transparent"></span>
        </div>
        <div class="rdv-presents">
          ${window.PLAYERS.map((p, pi) => {
            const state = rdv.presents && rdv.presents[p] === 1;
            if(state) count++;
            return `<div onclick="toggleRdv(${ri},'${p}')" title="${p}" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;cursor:pointer;background:${AV_BG[pi]};color:${AV_TX[pi]};opacity:${state?'1':'0.35'};border:${state?'2px solid #1D9E75':'1.5px solid transparent'}">${p.substring(0,2)}</div>`;
          }).join('')}
        </div>
        <span style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">${count>0?count+' présent'+(count>1?'s':''):'Personne encore'}</span>
      </div>
    </div>`;
  }).join('');
}

window.upRdv = function(ri, field, val) {
  window.D.rdvList[ri][field] = val;
  window.save();
}

window.toggleRdv = function(ri, p) {
  if(!window.D.rdvList[ri].presents) window.D.rdvList[ri].presents = {};
  window.D.rdvList[ri].presents[p] = (window.D.rdvList[ri].presents[p] || 0) === 1 ? 0 : 1;
  window.save();
}

window.addRdv = function() {
  window.D.rdvList.push({id:'rdv_'+Date.now(), date:'21', mois:'Juin', match:'Nouveau Match', heure:'21:00', where:'À définir', presents:{}});
  window.save();
}

window.removeRdv = function(ri) {
  window.D.rdvList.splice(ri, 1);
  window.save();
}
</script>
