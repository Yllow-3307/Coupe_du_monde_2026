function editPts(el,g,i){
  const cur=getPts(g,i);const inp=document.createElement('input');
  inp.type='number';inp.value=cur;inp.min=0;inp.max=9;
  inp.style.cssText='width:28px;height:22px;text-align:center;font-size:12px;border:0.5px solid var(--color-border-info);border-radius:4px;background:var(--color-background-info);color:var(--color-text-info)';
  el.replaceWith(inp);inp.focus();inp.select();
  const commit=()=>{D.pts[g+i]=Math.max(0,Math.min(9,parseInt(inp.value)||0));save();renderGroups()};
  inp.addEventListener('blur',commit);inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit()});
}

function renderBracket(){
  const el=document.getElementById('bracket');
  const R0_LEFT = Array.from({length:8},(_,i)=>({k1:`r0m${i}t1`,k2:`r0m${i}t2`}));
  const R0_RIGHT = Array.from({length:8},(_,i)=>({k1:`r0m${i+8}t1`,k2:`r0m${i+8}t2`}));

  function bCol(slots, ri, offset, flip){
    const spacer = Math.pow(2,ri)*6;
    let html = '';
    for(let i=0;i<slots;i++){
      const mi = offset + i;
      const k1=`r${ri}m${mi}t1`, k2=`r${ri}m${mi}t2`;
      const t1=D.bracket[k1]||(ri===0?`Éq.${mi*2+1}`:'?');
      const t2=D.bracket[k2]||(ri===0?`Éq.${mi*2+2}`:'?');
      const nk=`r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
      const w=D.bracket[nk];
      html+=`<div class="b-match">
        <div class="b-team${w===t1?' winner':''}" id="b-click-${ri}-${mi}-1">${t1}</div>
        <div class="b-team${w===t2?' winner':''}" id="b-click-${ri}-${mi}-2">${t2}</div>
      </div>`;
      if(i<slots-1) html+=`<div style="height:${spacer}px"></div>`;
    }
    return html;
  }

  const champion = D.bracket['r5m0t1'] || null;
  const colLabels = ["16es","8es","Quarts","Demies"];

  let leftCols = '';
  for(let r=0;r<4;r++){
    const slots = 8/Math.pow(2,r);
    leftCols += `<div class="b-col" style="min-width:120px">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column">${bCol(slots,r,0,false)}</div>
    </div>`;
  }

  let rightCols = '';
  for(let r=3;r>=0;r--){
    const slots = 8/Math.pow(2,3-r);
    rightCols += `<div class="b-col" style="min-width:120px">
      <div class="b-col-title">${colLabels[r]}</div>
      <div style="display:flex;flex-direction:column">${bColRight(slots,r)}</div>
    </div>`;
  }

function bColRight(slots, ri){
    const spacer = Math.pow(2,ri)*6;
    let html='';
    for(let i=0;i<slots;i++){
      const mi = (ri === 0) ? (8 + i) : (Math.pow(2, 3-ri)*2 + i);
      const k1=`r${ri}m${mi}t1`, k2=`r${ri}m${mi}t2`;
      const t1=D.bracket[k1]||(ri===0?`Éq.${mi*2+1}`:'?');
      const t2=D.bracket[k2]||(ri===0?`Éq.${mi*2+2}`:'?');
      const nk=`r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
      const w=D.bracket[nk];
      
      if (ri === 0) {
        html+=`<div class="b-match">
          <div style="display:flex;align-items:center;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:6px 6px 0 0" class="${w===t1?'winner':''}">
            <input type="text" value="${t1.startsWith('Éq.') ? '' : t1}" placeholder="${t1}" onchange="D.bracket['${k1}']=this.value;save();renderBracket()" style="flex:1;width:80px;font-size:11px;background:none;border:none;padding:5px 7px;color:inherit;outline:none">
            <span onclick="pickW(0,${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',1)" style="padding:5px;cursor:pointer;font-size:10px">✅</span>
          </div>
          <div style="display:flex;align-items:center;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-top:none;border-radius:0 0 6px 6px" class="${w===t2?'winner':''}">
            <input type="text" value="${t2.startsWith('Éq.') ? '' : t2}" placeholder="${t2}" onchange="D.bracket['${k2}']=this.value;save();renderBracket()" style="flex:1;width:80px;font-size:11px;background:none;border:none;padding:5px 7px;color:inherit;outline:none">
            <span onclick="pickW(0,${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',2)" style="padding:5px;cursor:pointer;font-size:10px">✅</span>
          </div>
        </div>`;
      } else {
        html+=`<div class="b-match">
          <div class="b-team${w===t1?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',1)">${t1}</div>
          <div class="b-team${w===t2?' winner':''}" onclick="pickW(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}',2)">${t2}</div>
        </div>`;
      }
      if(i<slots-1) html+=`<div style="height:${spacer}px"></div>`;
    }
    return html;
  }

  const fk1='r4m0t1', fk2='r4m0t2';
  const ft1=D.bracket[fk1]||'?'; const ft2=D.bracket[fk2]||'?';
  const fw=D.bracket['r5m0t1'];
  const finaleHtml=`<div class="b-col" style="min-width:120px;align-items:center">
    <div class="b-col-title" style="text-align:center">Finale</div>
    <div class="b-match">
      <div class="b-team${fw===ft1?' winner':''}" id="b-click-4-0-1">${ft1}</div>
      <div class="b-team${fw===ft2?' winner':''}" id="b-click-4-0-2">${ft2}</div>
    </div>
  </div>`;

  el.innerHTML=`<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Renseigne les équipes qualifiées après les groupes, puis clique sur le vainqueur de chaque match pour faire avancer le bracket.</p>
  <div class="bracket-wrap">
    <div class="bracket-tree" style="align-items:center">
      ${leftCols}
      <div style="width:8px"></div>
      ${finaleHtml}
      <div style="width:8px"></div>
      ${rightCols}
    </div>
    ${champion?`<div style="text-align:center;margin-top:16px"><div style="font-size:24px;margin-bottom:6px">🏆</div><div style="display:inline-block;padding:8px 20px;background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-lg);font-weight:500;color:var(--color-text-primary);font-size:14px">${champion}</div></div>`:''}
  </div>`;

  // Attribution dynamique des clics sécurisés pour les colonnes gauches et droites
  for(let r=0; r<4; r++) {
    const leftSlots = 8/Math.pow(2,r);
    for(let i=0; i<leftSlots; i++) {
      setupBracketClick(r, i);
    }
    const rightSlots = 8/Math.pow(2,3-r);
    for(let i=0; i<rightSlots; i++) {
      const mi = Math.pow(2,3-r)*1 + i;
      setupBracketClick(r, mi);
    }
  }
  setupBracketClick(4, 0);
}

function setupBracketClick(ri, mi) {
  const e1 = document.getElementById(`b-click-${ri}-${mi}-1`);
  const e2 = document.getElementById(`b-click-${ri}-${mi}-2`);
  if(e1) e1.onclick = function() { pickW(ri, mi, e1.textContent, e2 ? e2.textContent : '?', 1); };
  if(e2) e2.onclick = function() { pickW(ri, mi, e1 ? e1.textContent : '?', e2.textContent, 2); };
}

function pickW(ri, mi, t1, t2, tn) {
  const w = tn === 1 ? t1 : t2;
  const nk = `r${ri+1}m${Math.floor(mi/2)}t${(mi%2)+1}`;
  
  // Si on reclique sur l'équipe déjà sélectionnée, on vide la case du tour suivant
  if (D.bracket[nk] === w) {
    D.bracket[nk] = '?';
  } else {
    D.bracket[nk] = w;
  }
  
  save();
  renderBracket();
}

  <div class="section-title" style="margin-top:1.5rem">Pronos par match (Cochés dans l'onglet Matchs)</div>
  ${pronoMatchs.map(m=>{

      </div>
      <div>${POTES.map((pote)=>{

          <span style="color:var(--color-text-tertiary)">–</span>
          <input class="score-in" type="number" placeholder="?" value="${bet.s2}" oninput="setBet('${m.id}','${pote}','s2',this.value)" style="width:28px;height:24px;font-size:12px">
          <input class="inp-sm" placeholder="buteur..." value="${bet.top||''}" oninput="setBet('${m.id}','${pote}','top',this.value)" style="width:90px;height:24px;font-size:12px">
          ${pts>0?`<span class="pts-chip pts-${Math.min(pts,3)}">+${pts}</span>`:`<span class="pts-chip pts-0">—</span>`}

}

// Mettre à jour aussi la fonction calcPts pour s'aligner sur les nouveaux IDs de scores :
function calcPts(mid,pote){
  const bet=D.pronos[mid+pote];
  const as1=D.scores[mid+'a']; const as2=D.scores[mid+'b'];
  if(!bet||as1===undefined||as2===undefined||as1===''||as2==='')return 0;
  const bs1=parseInt(bet.s1),bs2=parseInt(bet.s2),nas1=parseInt(as1),nas2=parseInt(as2);
  if(isNaN(bs1)||isNaN(bs2)||isNaN(nas1)||isNaN(nas2))return 0;
  let pts=0; const res=(a,b)=>a>b?1:a<b?-1:0;
  if(res(bs1,bs2)===res(nas1,nas2))pts=1;
  if(bs1===nas1&&bs2===nas2)pts=2;
  if(pts>=1&&bet.top&&D.actual[mid]?.top&&bet.top.trim().toLowerCase()===D.actual[mid].top.trim().toLowerCase())pts=3;
  return pts;
}

// Et modifier calcLB pour chercher dans D.matchsList :
function calcLB(){
  return POTES.map(p=>({name:p,pts:D.matchsList.filter(m=>m.isProno).reduce((s,m)=>s+calcPts(m.id,p),0)})).sort((a,b)=>b.pts-a.pts);
}

  PRONO_MATCHES.forEach(m=>{
    document.getElementById(`act-${m.id}-s1`).oninput = function() { setActual(m.id, 's1', this.value); };
    document.getElementById(`act-${m.id}-s2`).oninput = function() { setActual(m.id, 's2', this.value); };
    document.getElementById(`act-${m.id}-top`).oninput = function() { setActual(m.id, 'top', this.value); };
    POTES.forEach(pote=>{
      document.getElementById(`bet-${m.id}-${pote}-s1`).oninput = function() { setBet(m.id, pote, 's1', this.value); };
      document.getElementById(`bet-${m.id}-${pote}-s2`).oninput = function() { setBet(m.id, pote, 's2', this.value); };
      document.getElementById(`bet-${m.id}-${pote}-top`).oninput = function() { setBet(m.id, pote, 'top', this.value); };
    });
  });
}

function setActual(mid,f,v){if(!D.actual[mid])D.actual[mid]={};D.actual[mid][f]=v;save();renderPronos()}
function setBet(mid,p,f,v){const k=mid+p;if(!D.pronos[k])D.pronos[k]={};D.pronos[k][f]=v;save();renderPronos()}
function calcPts(mid,pote){
  const bet=D.pronos[mid+pote];const actual=D.actual[mid];
  if(!bet||!actual||actual.s1===''||actual.s2==='')return 0;
  const bs1=parseInt(bet.s1),bs2=parseInt(bet.s2),as1=parseInt(actual.s1),as2=parseInt(actual.s2);
  if(isNaN(bs1)||isNaN(bs2)||isNaN(as1)||isNaN(as2))return 0;
  let pts=0;const res=(a,b)=>a>b?1:a<b?-1:0;
  if(res(bs1,bs2)===res(as1,as2))pts=1;
  if(bs1===as1&&bs2===as2)pts=2;
  if(pts>=1&&bet.top&&actual.top&&bet.top.trim().toLowerCase()===actual.top.trim().toLowerCase())pts=3;
  return pts;
}
function calcLB(){
  return POTES.map(p=>({name:p,pts:PRONO_MATCHES.reduce((s,m)=>s+calcPts(m.id,p),0)})).sort((a,b)=>b.pts-a.pts);
}

${D.teamStats.map((t,i)=>`<div style="display:grid;grid-template-columns:1.6fr 0.7fr 0.7fr 0.7fr 0.7fr 1.4fr;gap:4px;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary)">

function renderRdv(){

function toggleRdv(ri,p){if(!D.rdvList[ri].presents)D.rdvList[ri].presents={};D.rdvList[ri].presents[p]=(D.rdvList[ri].presents[p]||0)===1?0:1;save();renderRdv()}

function showTab(id){

}

function updateStatsAutomatique() {
  // Réinitialiser les compteurs temporairement
  D.teamStats.forEach(t => { t.goals = 0; t.played = 0; t.cs = 0; });

  D.matchsList.forEach(m => {
    const s1 = D.scores[m.id+'a'];
    const s2 = D.scores[m.id+'b'];
    if (s1 !== undefined && s2 !== undefined && s1 !== '' && s2 !== '') {
      const g1 = parseInt(s1); const g2 = parseInt(s2);
      
      // Trouver l'équipe 1 et l'équipe 2 dans le tableau des stats (en nettoyant les émojis)
      const t1Data = D.teamStats.find(t => m.t1.includes(t.name));
      const t2Data = D.teamStats.find(t => m.t2.includes(t.name));

      if (t1Data) {
        t1Data.played += 1;
        t1Data.goals += g1;
        if (g2 === 0) t1Data.cs += 1; // Clean Sheet
      }
      if (t2Data) {
        t2Data.played += 1;
        t2Data.goals += g2;
        if (g1 === 0) t2Data.cs += 1;
      }
    }
  });
  save();
}
